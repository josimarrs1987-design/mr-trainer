*{box-sizing:border-box;margin:0;padding:0;}

.hdr{background:#111;border-bottom:2px solid #C9A800;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:4px;}
.isel{background:#141414;color:#fff;border:1px solid #A88900;border-radius:8px;padding:9px 10px;outline:none;width:100%;font-size:13px;}

.warn{background:rgba(255,193,7,0.2);color:#FFC107;border:1px solid rgba(255,193,7,0.3);}

table{width:100%;border-collapse:collapse;}

// ── UTILS ──────────────────────────────────────────────────
function fmt(n, d) {
  if (n == null || n === "") return "—";
  var dec = (d == null) ? 1 : d;
  return Number(n).toLocaleString("pt-BR", { maximumFractionDigits: dec });
}

function parseDate(s) {
  if (!s) return new Date(0);
  var p = s.split("/");
  if (p.length < 3) return new Date(0);
  return new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
}

function todayStr() {
  var t = new Date();
  var dd = String(t.getDate()).padStart(2, "0");
  var mm = String(t.getMonth() + 1).padStart(2, "0");
  return dd + "/" + mm + "/" + t.getFullYear();
}

function uniq(arr) {
  var seen = {};
  var out = [];
  for (var i = 0; i < arr.length; i++) {
    if (!seen[arr[i]]) { seen[arr[i]] = true; out.push(arr[i]); }
  }
  return out.sort();
}

// ── DOM helpers
function el(tag, attrs, children) {
  var d = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      if (k === "cls") { d.className = attrs[k]; }
      else if (k === "html") { d.innerHTML = attrs[k]; }
      else if (k === "style" && typeof attrs[k] === "object") { Object.assign(d.style, attrs[k]); }
      else if (k.indexOf("on") === 0) { d.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
      else { d[k] = attrs[k]; }
    }
  }
  if (children) {
    var arr = Array.isArray(children) ? children : [children];
    for (var i = 0; i < arr.length; i++) {
      var c = arr[i];
      if (c == null || c === false) continue;
      if (typeof c === "string") { d.appendChild(document.createTextNode(c)); }
      else { d.appendChild(c); }
    }
  }
  return d;
}

function mkSel(attrs, opts) {
  var s = el("select", attrs);
  for (var i = 0; i < opts.length; i++) {
    var op = document.createElement("option");
    op.value = (opts[i].v != null) ? opts[i].v : opts[i].l;
    op.textContent = opts[i].l;
    s.appendChild(op);
  }
  return s;
}

function mkInput(type, attrs) {
  var defaults = { type: type, cls: "isel" };
  var merged = Object.assign({}, defaults, attrs || {});
  return el("input", merged);
}

function mkField(labelTxt, inputEl, span) {
  var w = el("div", span ? { cls: "full" } : null);
  w.appendChild(el("div", { cls: "flabel" }, [labelTxt]));
  w.appendChild(inputEl);
  return w;
}

function badge(cls, txt) {
  return el("span", { cls: "badge " + cls }, [txt]);
}

    { max: 14,   label: "Elevado",      cls: "warn" },

  ]
};

function cImc(v) {
  for (var i = 0; i < OMS.imc.length; i++) {
    if (Number(v) <= OMS.imc[i].max) return OMS.imc[i];
  }
  return OMS.imc[OMS.imc.length - 1];
}

function cGordura(v, sexo) {
  var list = (sexo === "F") ? OMS.gorduraF : OMS.gorduraM;
  for (var i = 0; i < list.length; i++) {
    if (Number(v) <= list[i].max) return list[i];
  }
  return list[list.length - 1];
}

function cVisceral(v) {
  for (var i = 0; i < OMS.visceral.length; i++) {
    if (Number(v) <= OMS.visceral[i].max) return OMS.visceral[i];
  }
  return OMS.visceral[OMS.visceral.length - 1];
}

function cAgua(v, sexo) {
  var mn = (sexo === "F") ? 45 : 50;
  var mx = (sexo === "F") ? 60 : 65;
  var n = Number(v);
  if (n >= mn && n <= mx) return { label: "Normal ✓", cls: "ok" };
  if (n < mn) return { label: "Abaixo do ideal", cls: "warn" };
  return { label: "Acima do ideal", cls: "warn" };
}

function cPressao(s, d) {
  var sv = Number(s), dv = Number(d);
  if (sv < 120 && dv < 80)  return { label: "Ótima ✓",           cls: "ok"   };
  if (sv < 130 && dv < 85)  return { label: "Normal ✓",           cls: "ok"   };
  if (sv < 140 || dv < 90)  return { label: "Pré-hipertensão",    cls: "warn" };
  if (sv < 160 || dv < 100) return { label: "Hipertensão Grau 1", cls: "bad"  };
  if (sv < 180 || dv < 110) return { label: "Hipertensão Grau 2", cls: "bad"  };
  return                           { label: "Hipertensão Grau 3", cls: "bad"  };
}

function cCintura(v, sexo) {
  var n = Number(v);
  if (sexo === "F") {
    if (n < 80)  return { label: "Sem risco ✓",   cls: "ok"   };
    if (n < 88)  return { label: "Risco aumentado",cls: "warn" };
    return               { label: "Risco elevado", cls: "bad"  };
  } else {
    if (n < 94)  return { label: "Sem risco ✓",   cls: "ok"   };
    if (n < 102) return { label: "Risco aumentado",cls: "warn" };
    return               { label: "Risco elevado", cls: "bad"  };
  }
}

function getRecomendacoes(av, sexo) {
  var recs = [];
  if (av.imc && cImc(av.imc).cls !== "ok")
    recs.push("IMC: atingir 18.5 – 24.9 kg/m²");
  if (av.massaGorda && cGordura(av.massaGorda, sexo).cls !== "ok")
    recs.push("Gordura corporal: objetivo " + (sexo === "F" ? "14–24%" : "6–17%"));
  if (av.gorduraVisceral && Number(av.gorduraVisceral) > 9)
    recs.push("Gordura visceral: reduzir para nível < 10");
  if (av.cintura && cCintura(av.cintura, sexo).cls !== "ok")
    recs.push("Cintura: objetivo " + (sexo === "F" ? "< 80 cm" : "< 94 cm"));
  if (av.pressaoSist && av.pressaoDiast && cPressao(av.pressaoSist, av.pressaoDiast).cls !== "ok")
    recs.push("Pressão arterial: objetivo < 120/80 mmHg");
  if (av.aguaCorporal && cAgua(av.aguaCorporal, sexo).cls !== "ok")
    recs.push("Hidratação: objetivo " + (sexo === "F" ? "45–60%" : "50–65%"));
  return recs;
}
// ── SVG CHARTS ─────────────────────────────────────────────
function svgLine(container, points, unit) {
  container.innerHTML = "";
  var pts = [];
  for (var i = 0; i < points.length; i++) {
    var p = points[i];
    if (p.v != null && p.v !== "" && !isNaN(Number(p.v))) {
      pts.push({ d: p.d, v: Number(p.v) });
    }
  }
  pts.sort(function(a, b) { return parseDate(a.d) - parseDate(b.d); });

  if (pts.length < 2) {
    container.innerHTML = "<div style='color:#555;font-size:10px;padding:8px;text-align:center'>Min. 2 registos</div>";
    return;
  }

  var W = (container.offsetWidth || 260);
  var H = 80;
  var PL = 32, PR = 8, PT = 14, PB = 20;
  var cw = W - PL - PR;
  var ch = H - PT - PB;

  var vals = [];
  for (var i = 0; i < pts.length; i++) vals.push(pts[i].v);
  var minV = Math.min.apply(null, vals);
  var maxV = Math.max.apply(null, vals);
  if (minV === maxV) { minV = Math.max(0, minV - 1); maxV = maxV + 1; }
  var rng = maxV - minV;
  minV = Math.max(0, minV - rng * 0.1);
  maxV = maxV + rng * 0.1;

  var ns = "http://www.w3.org/2000/svg";
  var svg = document.createElementNS(ns, "svg");
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.style.display = "block";
  svg.style.width = "100%";

  function xp(i) { return PL + i * (cw / (pts.length - 1)); }
  function yp(v) { return PT + ch - ((v - minV) / (maxV - minV)) * ch; }

  // Grid lines
  for (var g = 0; g <= 2; g++) {
    var gy = PT + g * (ch / 2);
    var gv = maxV - g * (maxV - minV) / 2;
    var gl = document.createElementNS(ns, "line");
    gl.setAttribute("x1", PL); gl.setAttribute("y1", gy);
    gl.setAttribute("x2", PL + cw); gl.setAttribute("y2", gy);
    gl.setAttribute("stroke", "#222"); gl.setAttribute("stroke-dasharray", "2,3");
    svg.appendChild(gl);
    var gt = document.createElementNS(ns, "text");
    gt.setAttribute("x", PL - 3); gt.setAttribute("y", gy + 3);
    gt.setAttribute("text-anchor", "end"); gt.setAttribute("font-size", "7");
    gt.setAttribute("fill", "#555");
    gt.textContent = fmt(gv, 0);
    svg.appendChild(gt);
  }

  // Area
  var apath = "M " + xp(0) + " " + (PT + ch);
  for (var i = 0; i < pts.length; i++) {
    apath += " L " + xp(i) + " " + yp(pts[i].v);
  }
  apath += " L " + xp(pts.length - 1) + " " + (PT + ch) + " Z";
  var af = document.createElementNS(ns, "path");
  af.setAttribute("d", apath);
  af.setAttribute("fill", "#C9A800");
  af.setAttribute("opacity", "0.12");
  svg.appendChild(af);

  // Line
  var lpath = "M " + xp(0) + " " + yp(pts[0].v);
  for (var i = 1; i < pts.length; i++) {
    lpath += " L " + xp(i) + " " + yp(pts[i].v);
  }
  var lp = document.createElementNS(ns, "path");
  lp.setAttribute("d", lpath);
  lp.setAttribute("fill", "none");
  lp.setAttribute("stroke", "#C9A800");
  lp.setAttribute("stroke-width", "2");
  svg.appendChild(lp);

  // Dots + labels
  for (var i = 0; i < pts.length; i++) {
    var cx = xp(i), cy = yp(pts[i].v);
    var c1 = document.createElementNS(ns, "circle");
    c1.setAttribute("cx", cx); c1.setAttribute("cy", cy);
    c1.setAttribute("r", "3.5");
    c1.setAttribute("fill", "#0A0A0A");
    c1.setAttribute("stroke", "#C9A800");
    c1.setAttribute("stroke-width", "1.5");
    svg.appendChild(c1);

    var vt = document.createElementNS(ns, "text");
    vt.setAttribute("x", cx); vt.setAttribute("y", cy - 5);
    vt.setAttribute("text-anchor", "middle");
    vt.setAttribute("font-size", "7"); vt.setAttribute("fill", "#C9A800");
    vt.setAttribute("font-weight", "700");
    vt.textContent = fmt(pts[i].v, 1) + (unit || "");
    svg.appendChild(vt);

    var xparts = pts[i].d.split("/");
    var xt = document.createElementNS(ns, "text");
    xt.setAttribute("x", cx); xt.setAttribute("y", H - 3);
    xt.setAttribute("text-anchor", "middle");
    xt.setAttribute("font-size", "7"); xt.setAttribute("fill", "#555");
    xt.textContent = xparts[0] + "/" + xparts[1];
    svg.appendChild(xt);
  }

  container.appendChild(svg);
}

    iPeso.addEventListener("input", function(e) { rec.peso = Number(e.target.value); });

      saveDB(); ov.remove(); renderApp();

        if (!rec.data || !aluno || !ex) { alert("Preencha todos os campos."); return; }
        var idx = -1;
        for (var i = 0; i < DB.registros.length; i++) {
          if (DB.registros[i].id === rec.id) { idx = i; break; }
        }
        var updated = { id: rec.id, data: rec.data, aluno: aluno, treino: sTreino.value,
          exercicio: ex, serie: rec.serie, reps: rec.reps, peso: rec.peso };
        if (idx >= 0) DB.registros[idx] = updated;
        if (aluno !== "" && !DB.clientes.find(function(c) { return c.nome === aluno; })) {
          DB.clientes.push({ id: genId(), nome: aluno, sexo: "M", dataNasc: "", altura: "", avaliacoes: [] });

    var iSerieN = mkInput("number", { value: "1", min: "1" });

    modal.appendChild(errDiv);

    var rowsTable = el("div", { style: { marginTop: "8px" } });

    function renderRows() {
      rowsTable.innerHTML = "";
      if (!rows.length) return;
      var hdr = el("div", { style: { fontSize: "9px", color: "#777", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "4px" } },

      var htr = el("tr");

        tr.appendChild(el("td", { style: { textAlign: "center" } }, [r.treino]));

        tr.appendChild(el("td", { style: { textAlign: "center" } }, [String(r.reps)]));
        tr.appendChild(el("td", { style: { fontWeight: "700", color: "#C9A800" } }, [r.peso + "kg"]));
        (function(rid) {
          var xb = el("button", { style: { background: "none", border: "none", color: "#F44336", cursor: "pointer", fontSize: "12px" } }, ["X"]);
          xb.addEventListener("click", function() {
            rows = rows.filter(function(x) { return x.id !== rid; });
            renderRows();
          });
          tr.appendChild(el("td", { style: { textAlign: "center" } }, [xb]));
        })(r.id);
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);
      rowsTable.appendChild(tbl);
    }

    function addRow() {
      var aluno = sAluno.value === "__novo__" ? iNovoAluno.value.trim() : sAluno.value;
      var ex = sEx.value === "__novo__" ? iNovoEx.value.trim() : sEx.value;

      }
      if (!/^\d{2}\/\d{2}\/\d{4}$/.test(iData.value)) {
        setErr("Data: DD/MM/AAAA"); return;
      }
      setErr("");
      rows.push({ id: genId(), data: iData.value, aluno: aluno, treino: sTreino.value,

        peso: Number(iPesoN.value) });
      iSerieN.value = String(Number(iSerieN.value) + 1);
      iPesoN.value = "";
      renderRows();
    }

    var addBtn = el("button", { style: { background: "#C9A800", color: "#000", border: "none", borderRadius: "8px", padding: "9px 14px", fontSize: "13px", fontWeight: "700", cursor: "pointer", marginTop: "8px", width: "100%" } }, ["+ Add Serie"]);
    addBtn.addEventListener("click", addRow);
    modal.appendChild(addBtn);

    var foot2 = el("div", { style: { display: "flex", justifyContent: "flex-end", gap: "8px", marginTop: "10px" } });
    foot2.appendChild(el("button", { cls: "btn-outline", onClick: function() { ov.remove(); } }, ["Cancelar"]));
    foot2.appendChild(el("button", { cls: "btn-gold", onClick: function() {
      if (!rows.length) { setErr("Adicione ao menos uma serie."); return; }
      // Add new aluno to DB if needed
      for (var i = 0; i < rows.length; i++) {
        var rAluno = rows[i].aluno;
        var found = false;
        for (var j = 0; j < DB.clientes.length; j++) {
          if (DB.clientes[j].nome === rAluno) { found = true; break; }
        }
        if (!found && rAluno) {
          DB.clientes.push({ id: genId(), nome: rAluno, sexo: "M", dataNasc: "", altura: "", avaliacoes: [] });
        }
        DB.registros.push(rows[i]);
      }
      saveDB(); ov.remove(); renderApp();
    }}, ["Guardar (" + rows.length + ")"]));
    modal.appendChild(foot2);
  }

  ov.appendChild(modal);
  document.getElementById("app").appendChild(ov);
}

// ── PDF EXPORT ─────────────────────────────────────────────
function exportPDF(cliente) {
  var avs = cliente.avaliacoes || [];
  if (!avs.length) { alert("Sem avaliacoes para exportar."); return; }
  var latest = avs[avs.length - 1];
  var sexo = cliente.sexo || "M";

  var win = window.open("", "_blank");
  if (!win) { alert("Permitir popups para gerar PDF."); return; }

  var sbg = { ok: "#e8f5e9", warn: "#fff8e1", bad: "#ffebee" };
  var scol = { ok: "#2e7d32", warn: "#e65100", bad: "#c62828" };

  function row(label, val, cls, classLabel, ref) {
    var bc = sbg[cls] || "#f5f5f5";
    var fc = scol[cls] || "#333";
    return "<tr><td style='padding:6px 8px;font-size:12px;color:#555;'>" + label +
      "</td><td style='padding:6px 8px;font-weight:700;'>" + val +
      "</td><td style='padding:6px 8px;font-size:10px;color:#888;'>" + (ref || "") +
      "</td><td style='padding:4px 6px;'>" +
      (classLabel ? "<span style='background:" + bc + ";color:" + fc + ";border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;'>" + classLabel + "</span>" : "") +
      "</td></tr>";
  }

  var rows = "";
  if (latest.imc) { var r1 = cImc(latest.imc); rows += row("IMC", latest.imc + " kg/m²", r1.cls, r1.label, "Ideal: 18.5 – 24.9"); }

  if (latest.imc) { var m1 = cImc(latest.imc); metrics.push({ n: "IMC", v: latest.imc + " kg/m²", cls: m1.cls, l: m1.label, r: "Ideal: 18.5–24.9" }); }
  if (latest.massaGorda) { var m2 = cGordura(latest.massaGorda, sexo); metrics.push({ n: "Massa Gorda", v: latest.massaGorda + "%", cls: m2.cls, l: m2.label, r: "Ideal: " + (sexo === "F" ? "14–24%" : "6–17%") }); }
  if (latest.gorduraVisceral) { var m3 = cVisceral(latest.gorduraVisceral); metrics.push({ n: "Gordura Visceral", v: "Nivel " + latest.gorduraVisceral, cls: m3.cls, l: m3.label, r: "Ideal: 1–9" }); }
  if (latest.aguaCorporal) { var m4 = cAgua(latest.aguaCorporal, sexo); metrics.push({ n: "Agua Corporal", v: latest.aguaCorporal + "%", cls: m4.cls, l: m4.label, r: "Ideal: " + (sexo === "F" ? "45–60%" : "50–65%") }); }
  if (latest.pressaoSist && latest.pressaoDiast) { var m5 = cPressao(latest.pressaoSist, latest.pressaoDiast); metrics.push({ n: "Pressao Arterial", v: latest.pressaoSist + "/" + latest.pressaoDiast + " mmHg", cls: m5.cls, l: m5.label, r: "Ideal: < 120/80" }); }
  if (latest.cintura) { var m6 = cCintura(latest.cintura, sexo); metrics.push({ n: "Cintura", v: latest.cintura + " cm", cls: m6.cls, l: m6.label, r: "Ideal: " + (sexo === "F" ? "< 80cm" : "< 94cm") }); }

  if (metrics.length) {
    var mb = el("div", { style: { background: "#141414", borderRadius: "8px", padding: "8px 10px" } });
    for (var mi = 0; mi < metrics.length; mi++) {
      var m = metrics[mi];
      var mrow = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #1a1a1a" } });
      var mleft = el("div", null, [
        el("div", { style: { fontSize: "12px", color: "#aaa" } }, [m.n]),
        el("div", { style: { fontSize: "9px", color: "#555", marginTop: "2px" } }, [m.r])
      ]);
      var mright = el("div", { style: { textAlign: "right" } }, [
        el("div", { style: { fontSize: "13px", fontWeight: "700" } }, [m.v]),
        badge(m.cls, m.l)
      ]);
      mrow.appendChild(mleft); mrow.appendChild(mright);
      mb.appendChild(mrow);
    }
    hs.appendChild(mb);
  }

  var recs = getRecomendacoes(latest, sexo);
  if (recs.length) {
    var rb = el("div", { style: { marginTop: "10px", background: "rgba(201,168,0,0.08)", border: "1px solid rgba(201,168,0,0.2)", borderRadius: "8px", padding: "10px" } });
    rb.appendChild(el("div", { style: { fontSize: "10px", color: "#C9A800", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "5px" } }, ["Objetivos de Saude"]));
    for (var ri = 0; ri < recs.length; ri++) {
      rb.appendChild(el("div", { style: { fontSize: "11px", color: "#ccc", marginBottom: "3px" } }, ["• " + recs[ri]]));
    }
    hs.appendChild(rb);
  }
  wrap.appendChild(hs);

  // Graficos avaliacao
  if (avs.length >= 2) {
    var gbox = el("div", { style: { background: "#1C1C1C", border: "1px solid #2A2A2A", borderRadius: "12px", padding: "14px", marginBottom: "12px" } });
    gbox.appendChild(el("div", { cls: "sec-title" }, ["Evolucao nas Avaliacoes"]));
    var cgrid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" } });
    var gcharts = [
      { f: "peso", l: "Peso", u: "kg" },
      { f: "imc", l: "IMC", u: "" },
      { f: "massaGorda", l: "Massa Gorda", u: "%" },
      { f: "cintura", l: "Cintura", u: "cm" }
    ];
    for (var gc = 0; gc < gcharts.length; gc++) {
      var gt = gcharts[gc];
      var pts2 = avs.filter(function(a) { return a[gt.f] && Number(a[gt.f]) > 0; });
      if (pts2.length < 2) continue;
      var cbox = el("div", { style: { background: "#141414", borderRadius: "8px", padding: "8px" } });
      cbox.appendChild(el("div", { style: { fontSize: "10px", color: "#C9A800", fontWeight: "700", marginBottom: "4px" } }, [gt.l]));
      var cDiv = el("div");
      cbox.appendChild(cDiv);
      cgrid.appendChild(cbox);
      (function(div, field, pts3, unit) {
        setTimeout(function() {
          var mapped = pts3.map(function(a) { return { d: a.dataAv, v: a[field] }; });
          svgLine(div, mapped, unit);
        }, 10);
      })(cDiv, gt.f, pts2, gt.u);
    }
    gbox.appendChild(cgrid);
    wrap.appendChild(gbox);
  }

  // Historico avaliacoes
  var hist = el("div", { style: { background: "#1C1C1C", border: "1px solid #2A2A2A", borderRadius: "12px", padding: "14px", marginBottom: "12px" } });
  hist.appendChild(el("div", { cls: "sec-title" }, ["Historico (" + avs.length + ")"]));
  for (var hi = avs.length - 1; hi >= 0; hi--) {
    var av2 = avs[hi];
    var hcard = el("div", { style: { background: "#141414", border: "1px solid #2A2A2A", borderRadius: "8px", padding: "10px", marginBottom: "6px", display: "flex", justifyContent: "space-between", alignItems: "center" } });
    hcard.appendChild(el("div", null, [
      el("div", { style: { fontWeight: "700", fontSize: "13px" } }, [av2.dataAv || "Sem data"]),
      el("div", { style: { fontSize: "10px", color: "#777", marginTop: "2px" } }, [
        (av2.peso ? "Peso: " + av2.peso + "kg" : "") + (av2.imc ? " · IMC: " + av2.imc : "") + (av2.objetivo ? " · " + av2.objetivo : "")
      ])
    ]));
    (function(avRec) {
      hcard.appendChild(el("button", { cls: "btn-sm", onClick: function() { showModalAvaliacao(cliente, avRec); } }, ["Editar"]));
    })(av2);
    hist.appendChild(hcard);
  }
  wrap.appendChild(hist);

  // Perimetros
  if (latest) {
    var hasPerim = false;
    for (var pi = 0; pi < PERIMETROS.length; pi++) {
      if (latest[PERIMETROS[pi][0]] && Number(latest[PERIMETROS[pi][0]]) > 0) { hasPerim = true; break; }
    }
    if (hasPerim) {
      var ps = el("div", { style: { background: "#1C1C1C", border: "1px solid #2A2A2A", borderRadius: "12px", padding: "14px" } });
      ps.appendChild(el("div", { cls: "sec-title" }, ["Perimetros (cm) — " + latest.dataAv]));
      var pg = el("div", { cls: "grid3" });
      for (var pi2 = 0; pi2 < PERIMETROS.length; pi2++) {
        var pf = PERIMETROS[pi2][0];
        var pl = PERIMETROS[pi2][1];
        if (!latest[pf] || Number(latest[pf]) === 0) continue;
        var pc2 = el("div", { style: { background: "#141414", borderRadius: "7px", padding: "8px", textAlign: "center" } });
        pc2.appendChild(el("div", { style: { fontSize: "9px", color: "#777", marginBottom: "3px" } }, [pl]));
        pc2.appendChild(el("div", { style: { fontSize: "16px", fontWeight: "700" } }, [latest[pf]]));
        pc2.appendChild(el("div", { style: { fontSize: "9px", color: "#C9A800" } }, ["cm"]));
        pg.appendChild(pc2);
      }
      ps.appendChild(pg);
      wrap.appendChild(ps);
    }
  }
}

function buildClientesView(wrap) {
  var iSearch = mkInput("text", { placeholder: "Pesquisar cliente...", style: { width: "100%", marginBottom: "12px" }, value: STATE.search || "" });
  iSearch.addEventListener("input", function(e) { STATE.search = e.target.value; renderApp(); });
  wrap.appendChild(iSearch);

  var filtered = DB.clientes.filter(function(c) {
    if (!STATE.search) return true;
    return c.nome.toLowerCase().indexOf(STATE.search.toLowerCase()) >= 0;
  });

  if (!filtered.length) {
    wrap.appendChild(el("div", { style: { textAlign: "center", padding: "40px", color: "#777" } }, [
      el("div", { style: { fontSize: "36px", marginBottom: "10px" } }, ["👥"]),
      el("div", { style: { fontSize: "15px", fontWeight: "700", marginBottom: "6px" } }, ["Nenhum cliente"]),
      el("button", { cls: "btn-gold", style: { marginTop: "10px" }, onClick: function() { showModalCliente(); } }, ["+ Adicionar Cliente"])
    ]));
    return;
  }

  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var avs = c.avaliacoes || [];
    var latest = avs.length ? avs[avs.length - 1] : null;
    var card = el("div", { style: { background: "#141414", border: "1px solid #2A2A2A", borderRadius: "10px", padding: "12px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" } });
    card.appendChild(el("div", null, [
      el("div", { style: { fontSize: "14px", fontWeight: "700" } }, [c.nome]),
      el("div", { style: { fontSize: "10px", color: "#777", marginTop: "2px" } }, [
        (c.sexo === "F" ? "Feminino" : "Masculino") + (c.dataNasc ? " · " + c.dataNasc : "") + " · " + avs.length + " avaliacao(oes)" + (latest ? " · Ultima: " + latest.dataAv : "")
      ])
    ]));
    var cb = el("div", { style: { display: "flex", gap: "6px" } });
    (function(cliente) {
      var vBtn = el("button", { cls: "btn-sm" }, ["Ver"]);
      vBtn.addEventListener("click", function(e) { e.stopPropagation(); STATE.tab = "perfil"; STATE.clienteId = cliente.id; renderApp(); });
      cb.appendChild(vBtn);
      if (cliente.avaliacoes && cliente.avaliacoes.length) {
        var pBtn = el("button", { cls: "btn-sm", style: { color: "#C9A800" } }, ["PDF"]);
        pBtn.addEventListener("click", function(e) { e.stopPropagation(); exportPDF(cliente); });
        cb.appendChild(pBtn);
      }
    })(c);
    card.appendChild(cb);
    card.addEventListener("click", function() {
      STATE.tab = "perfil"; STATE.clienteId = c.id; renderApp();
    });
    wrap.appendChild(card);
  }
}
// ── MAIN RENDER ────────────────────────────────────────────
function renderApp() {
  var app = document.getElementById("app");
  // Remove only non-overlay children
  var toRemove = [];
  for (var i = 0; i < app.children.length; i++) {
    if (!app.children[i].classList.contains("overlay")) toRemove.push(app.children[i]);
  }
  for (var i = 0; i < toRemove.length; i++) toRemove[i].remove();

  var TABS = [
    { k: "treinos", l: "Treinos" },
    { k: "registros", l: "Registros" },
    { k: "clientes", l: "Clientes" },
    { k: "perfil", l: "Avaliacao" }
  ];

  // Header
  var hdr = el("div", { cls: "hdr" });
  var hLeft = el("div", { style: { display: "flex", alignItems: "center", gap: "12px" } });
  hLeft.appendChild(el("div", { cls: "logo" }, ["MR"]));
  hLeft.appendChild(el("div", null, [
    el("div", { style: { fontSize: "16px", fontWeight: "800", letterSpacing: "1px" } }, ["MAZINHO RODRIGUES"]),
    el("div", { style: { fontSize: "9px", color: "#C9A800", letterSpacing: "3px", textTransform: "uppercase" } }, ["Personal Trainer"])
  ]));
  hdr.appendChild(hLeft);

  // Header action buttons based on tab
  var hRight = el("div", { style: { display: "flex", gap: "6px" } });
  if (STATE.tab === "treinos" || STATE.tab === "registros") {
    var nb = el("button", { cls: "btn-gold", style: { fontSize: "12px", padding: "8px 14px" } }, ["+ Registo"]);
    nb.addEventListener("click", function() { showModalTreino(); });
    hRight.appendChild(nb);
  }
  if (STATE.tab === "clientes" || STATE.tab === "perfil") {
    var nc = el("button", { cls: "btn-gold", style: { fontSize: "12px", padding: "8px 14px" } }, ["+ Cliente"]);
    nc.addEventListener("click", function() { showModalCliente(); });
    hRight.appendChild(nc);
  }
  hdr.appendChild(hRight);
  app.appendChild(hdr);

  // Tabs bar
  var tabBar = el("div", { style: { display: "flex", gap: "0", borderBottom: "2px solid #2A2A2A", overflow: "hidden" } });
  for (var ti = 0; ti < TABS.length; ti++) {
    var t = TABS[ti];
    var act = STATE.tab === t.k;
    var tbtn = el("button", { style: {
      background: act ? "#C9A800" : "#141414",
      color: act ? "#000" : "#777",
      border: "none",
      borderRight: "1px solid #2A2A2A",
      padding: "10px 14px",
      fontWeight: act ? "700" : "400",
      fontSize: "12px",
      cursor: "pointer",
      flex: "1"
    }}, [t.l]);
    (function(key) { tbtn.addEventListener("click", function() { STATE.tab = key; STATE.search = ""; renderApp(); }); })(t.k);
    tabBar.appendChild(tbtn);
  }
  app.appendChild(tabBar);

  // Content
  var content = el("div", { style: { padding: "14px 16px", maxWidth: "700px", margin: "0 auto" } });

  if (STATE.tab === "treinos") buildTreinosView(content);
  else if (STATE.tab === "registros") buildRegistrosView(content);
  else if (STATE.tab === "clientes") buildClientesView(content);
  else if (STATE.tab === "perfil") buildPerfilView(content);

  app.appendChild(content);
}

renderApp();
</script>
</body>
</html>
