<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MR Trainer"/>
<meta name="theme-color" content="#C9A800"/>
<title>MR Trainer</title>
<style>
/* ── Reset ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
svg{pointer-events:none;}
html,body{height:100%;overflow:hidden;background:#0C0C0C;}
body{color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
input,select,button,textarea{font-family:inherit;}
img{display:block;}

/* ── Shell ─────────────────────────────────────────────── */
#shell{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#0C0C0C;}
#topbar{flex-shrink:0;z-index:30;background:#0C0C0C;border-bottom:1px solid #1A1A1A;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:76px;background:#0C0C0C;}
#content::-webkit-scrollbar{display:none;}
#navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0C0C0C;border-top:1px solid #1A1A1A;display:flex;padding:8px 0 calc(6px + env(safe-area-inset-bottom));z-index:40;}

/* ── Topbar ─────────────────────────────────────────────── */
.tb-inner{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:38px;height:38px;border-radius:10px;background:var(--accent,#C9A800);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#000;flex-shrink:0;box-shadow:0 2px 14px var(--accent-glow,rgba(201,168,0,0.35));}
.tb-logo img{width:38px;height:38px;border-radius:10px;object-fit:cover;}
.tb-name{font-size:16px;font-weight:800;letter-spacing:-0.2px;}
.tb-sub{font-size:9px;color:#555;letter-spacing:2.5px;text-transform:uppercase;margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:#181800;border:1.5px solid var(--accent-dim,rgba(201,168,0,0.3));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent,#C9A800);cursor:pointer;overflow:hidden;flex-shrink:0;}
.tb-avatar img{width:100%;height:100%;object-fit:cover;}
.tb-greeting{font-size:11px;color:#555;text-align:right;line-height:1.4;}
.tb-greeting strong{color:#aaa;font-weight:600;}

/* ── Navbar ─────────────────────────────────────────────── */
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 4px 3px;transition:opacity 0.12s;}
.nav-item:active{opacity:0.6;}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:20px;height:20px;stroke:#444;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.nav-item.active .nav-icon svg{stroke:var(--accent,#C9A800);}
.nav-label{font-size:9px;color:#444;letter-spacing:0.4px;text-transform:uppercase;font-weight:600;transition:color 0.2s;}
.nav-item.active .nav-label{color:var(--accent,#C9A800);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent,#C9A800);margin:0 auto;opacity:0;transition:opacity 0.2s;}
.nav-item.active .nav-dot{opacity:1;}

/* ── Typography ─────────────────────────────────────────── */
.page-title{font-size:22px;font-weight:900;letter-spacing:-0.5px;padding:18px 20px 0;}
.section-title{font-size:11px;font-weight:700;color:#555;letter-spacing:1.5px;text-transform:uppercase;padding:18px 20px 8px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px;}
.sec-hdr-t{font-size:13px;font-weight:800;color:#fff;}
.sec-hdr-l{font-size:11px;color:var(--accent,#C9A800);font-weight:600;cursor:pointer;}
.lbl{font-size:9px;color:#555;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-top:12px;margin-bottom:4px;}

/* ── Cards ──────────────────────────────────────────────── */
.card{background:#131313;border:1px solid #1E1E1E;border-radius:16px;}
.card-inner{padding:16px;}
.card-press{cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.card-press:active{border-color:var(--accent-dim,rgba(201,168,0,0.3));transform:scale(0.99);}

/* ── KPI strip ──────────────────────────────────────────── */
.kpi-strip{display:flex;gap:8px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.kpi-strip::-webkit-scrollbar{display:none;}
.kpi-cell{flex:0 0 auto;background:#131313;border:1px solid #1E1E1E;border-radius:14px;padding:14px 16px;min-width:100px;}
.kpi-cell.accent{background:linear-gradient(135deg,#181400,#1E1900);border-color:var(--accent-dim,rgba(201,168,0,0.2));}
.kpi-num{font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;}
.kpi-num sup{font-size:12px;font-weight:600;color:#555;margin-left:1px;}
.kpi-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:5px;font-weight:600;}

/* ── Quick actions ──────────────────────────────────────── */
.quick-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
.quick-card{background:#131313;border:1px solid #1E1E1E;border-radius:16px;padding:18px 16px;cursor:pointer;transition:transform 0.1s,border-color 0.15s;}
.quick-card:active{transform:scale(0.97);}
.quick-card.gold{background:linear-gradient(145deg,var(--accent,#C9A800),#E8C840);border:none;}
.quick-card.gold:active{transform:scale(0.97);}
.qc-icon{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.qc-icon svg{width:22px;height:22px;stroke:rgba(255,255,255,0.7);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.quick-card.gold .qc-icon{background:rgba(0,0,0,0.15);}
.quick-card.gold .qc-icon svg{stroke:#000;}
.qc-title{font-size:13px;font-weight:700;color:#fff;line-height:1.3;}
.quick-card.gold .qc-title{color:#000;}
.qc-sub{font-size:10px;color:#555;margin-top:3px;}
.quick-card.gold .qc-sub{color:rgba(0,0,0,0.5);}

/* ── Stat bar ────────────────────────────────────────────── */
.stat-bar{margin:10px 20px 0;}
.stat-bar-inner{background:#131313;border:1px solid #1E1E1E;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color 0.15s;}
.stat-bar-inner:active{border-color:var(--accent-dim,rgba(201,168,0,0.3));}
.sbl{display:flex;align-items:center;gap:12px;}
.sb-icon{width:36px;height:36px;border-radius:9px;background:#1A1A1A;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-icon svg{width:18px;height:18px;stroke:var(--accent,#C9A800);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-title{font-size:14px;font-weight:700;}
.sb-sub{font-size:10px;color:#555;margin-top:2px;}
.sb-right{display:flex;align-items:center;gap:8px;}
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;}
.badge-green{background:rgba(76,175,80,0.12);color:#5CB85C;border:1px solid rgba(76,175,80,0.2);}
.badge-amber{background:rgba(255,193,7,0.1);color:#FFC107;border:1px solid rgba(255,193,7,0.2);}
.badge-red{background:rgba(244,67,54,0.1);color:#E74C3C;border:1px solid rgba(244,67,54,0.2);}
.chevron{width:16px;height:16px;stroke:#333;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Progress bar ────────────────────────────────────────── */
.prog-wrap{background:#1A1A1A;border-radius:3px;height:3px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent,#C9A800),#F5D020);border-radius:3px;transition:width 0.8s ease;}

/* ── Client list ─────────────────────────────────────────── */
.client-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid #141414;cursor:pointer;transition:background 0.1s;}
.client-item:active{background:#111;}
.c-av{width:44px;height:44px;border-radius:50%;background:#181800;border:1.5px solid rgba(201,168,0,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--accent,#C9A800);flex-shrink:0;overflow:hidden;}
.c-av img{width:100%;height:100%;object-fit:cover;}
.c-av-lg{width:56px;height:56px;font-size:18px;}
.c-body{flex:1;min-width:0;}
.c-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-meta{font-size:10px;color:#555;margin-top:2px;}

/* ── Train grid ──────────────────────────────────────────── */
.train-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
.train-cell{background:#131313;border:1px solid #1E1E1E;border-radius:16px;padding:18px 16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.train-cell:active{border-color:var(--accent-dim,rgba(201,168,0,0.3));transform:scale(0.98);}
.tc-icon{width:44px;height:44px;border-radius:11px;background:#181800;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.tc-icon svg{width:22px;height:22px;stroke:var(--accent,#C9A800);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.tc-title{font-size:13px;font-weight:700;color:var(--accent,#C9A800);line-height:1.3;}
.tc-sub{font-size:10px;color:#444;margin-top:4px;line-height:1.4;}

/* ── Report items ────────────────────────────────────────── */
.report-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 20px;}
.report-cell{background:#131313;border:1px solid #1E1E1E;border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color 0.15s;}
.report-cell:active{border-color:var(--accent-dim,rgba(201,168,0,0.3));}
.rc-icon{width:40px;height:40px;border-radius:10px;background:#181800;display:flex;align-items:center;justify-content:center;}
.rc-icon svg{width:20px;height:20px;stroke:var(--accent,#C9A800);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.rc-label{font-size:10px;color:#888;font-weight:600;text-align:center;line-height:1.3;}

/* ── Sheet / modal ───────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.sheet{background:#111;border:1px solid #222;border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:0 20px 30px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet::-webkit-scrollbar{display:none;}
.sheet-handle{width:36px;height:4px;background:#222;border-radius:2px;margin:14px auto 18px;}
.sheet-title{font-size:18px;font-weight:900;letter-spacing:-0.3px;margin-bottom:18px;}

/* ── Inputs ──────────────────────────────────────────────── */
.inp{width:100%;background:#161616;color:#fff;border:1px solid #222;border-radius:11px;padding:11px 14px;font-size:13px;outline:none;-webkit-appearance:none;transition:border-color 0.18s;}
.inp:focus{border-color:var(--accent,#C9A800);}
.inp::placeholder{color:#383838;}
textarea.inp{resize:none;height:72px;line-height:1.5;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── Buttons ──────────────────────────────────────────────── */
.btn-primary{width:100%;padding:14px;background:var(--accent,#C9A800);color:#000;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.2px;margin-top:16px;transition:opacity 0.1s;}
.btn-primary:active{opacity:0.85;}
.btn-secondary{width:100%;padding:12px;background:none;color:#555;border:1px solid #222;border-radius:12px;font-size:13px;cursor:pointer;margin-top:8px;transition:border-color 0.15s;}
.btn-secondary:active{border-color:#444;}
.btn-danger{width:100%;padding:11px;background:none;color:#E74C3C;border:1px solid rgba(244,67,54,0.25);border-radius:12px;font-size:12px;cursor:pointer;margin-top:8px;}

/* ── Pill selector ───────────────────────────────────────── */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.pill{padding:6px 14px;border-radius:20px;border:1px solid #222;background:#161616;color:#555;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.12s;letter-spacing:0.2px;}
.pill.on{background:var(--accent,#C9A800);color:#000;border-color:var(--accent,#C9A800);}

/* ── Animations ──────────────────────────────────────────── */
.fade-in{animation:fi 0.22s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.sheet-in{animation:si 0.28s cubic-bezier(0.32,0.72,0,1) both;}
@keyframes si{from{transform:translateY(100%);}to{transform:translateY(0);}}

/* ── Pointer events fix (SVG click interception) ─────────── */
.nav-item svg,.quick-card svg,.train-cell svg,.report-cell svg,
.stat-bar-inner svg,.card-press svg,.client-item svg,
.qc-icon svg,.tc-icon svg,.rc-icon svg,.sb-icon svg,
.nav-icon svg,.tb-right svg{pointer-events:none;}

/* ── Accent token ────────────────────────────────────────── */
:root{--accent:#C9A800;--accent-dim:rgba(201,168,0,0.22);--accent-glow:rgba(201,168,0,0.3);}

/* ── App modals & forms ──────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.modal{background:#111;border:1px solid rgba(201,168,0,0.35);border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:0 18px 30px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:si 0.28s cubic-bezier(0.32,0.72,0,1) both;}
.modal::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;background:#222;border-radius:2px;margin:14px auto 18px;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-top:4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.full{grid-column:1/-1;}
.flabel{font-size:9px;color:#555;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.isel{background:#161616;color:#fff;border:1px solid #252525;border-radius:10px;padding:10px 12px;outline:none;width:100%;font-size:13px;transition:border-color 0.18s;-webkit-appearance:none;}
.isel:focus{border-color:var(--accent,#C9A800);}
.isel::placeholder{color:#383838;}
textarea.isel{resize:none;height:56px;line-height:1.5;}
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 9px;font-size:9px;font-weight:700;margin-top:3px;letter-spacing:0.3px;}
.ok{background:rgba(76,175,80,0.15);color:#5CB85C;border:1px solid rgba(76,175,80,0.25);}
.warn{background:rgba(255,193,7,0.15);color:#FFC107;border:1px solid rgba(255,193,7,0.25);}
.bad{background:rgba(244,67,54,0.15);color:#E74C3C;border:1px solid rgba(244,67,54,0.25);}
.pr-badge{background:linear-gradient(135deg,var(--accent,#C9A800),#F5D020);color:#000;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:900;letter-spacing:0.5px;display:inline-flex;align-items:center;}
.btn-gold{background:linear-gradient(135deg,var(--accent,#C9A800),#E8C840);color:#000;border:none;border-radius:10px;padding:12px 18px;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.1s;}
.btn-gold:active{opacity:0.85;}
.btn-outline{background:none;border:1px solid #252525;color:#666;border-radius:10px;padding:9px 14px;cursor:pointer;font-size:12px;transition:border-color 0.15s;}
.btn-outline:active{border-color:var(--accent,#C9A800);color:var(--accent,#C9A800);}
.btn-red{background:none;border:1px solid rgba(244,67,54,0.35);color:#E74C3C;border-radius:10px;padding:9px 14px;cursor:pointer;font-size:12px;}
.btn-sm{background:#1A1A1A;border:1px solid rgba(201,168,0,0.25);color:var(--accent,#C9A800);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;transition:background 0.15s;}
.btn-sm:active{background:#201C00;}
.btn-press{transition:transform 0.1s,opacity 0.1s;}
.btn-press:active{transform:scale(0.96);opacity:0.85;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 10px;font-size:9px;color:var(--accent,#C9A800);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1A1A1A;text-align:left;background:#0D0D0D;}
td{padding:8px 10px;font-size:11px;}
tr.odd{background:#111;}
tr.even{background:#0D0D0D;}
tr.odd td,tr.even td{border-bottom:1px solid #141414;}
.chart-wrap{width:100%;overflow:hidden;}
.sec-title{font-size:9px;font-weight:700;color:var(--accent,#C9A800);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid #1A1A1A;padding-bottom:6px;}
.pill-btn{border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;border:1px solid #252525;background:#161616;color:#666;transition:background 0.12s,color 0.12s,border-color 0.12s;}
.pill-btn.active{background:var(--accent,#C9A800);color:#000;border-color:var(--accent,#C9A800);font-weight:700;}
.rating-btn{width:30px;height:30px;border-radius:8px;border:1px solid #252525;background:#161616;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:background 0.12s;}
.rating-btn.active{background:var(--accent,#C9A800);color:#000;border-color:var(--accent,#C9A800);}
.perim-cell{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:9px;padding:8px;text-align:center;}
.perim-label{font-size:9px;color:#555;margin-bottom:2px;}
.perim-value{font-size:16px;font-weight:700;color:#fff;}
.perim-unit{font-size:9px;color:var(--accent,#C9A800);}
.hist-card{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:10px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #111;}
.chart-cell{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:10px;padding:8px;}
.cmp-card{background:#0D0D0D;border:1px solid #1A1A1A;border-radius:10px;padding:10px;text-align:center;}
.an-item{background:#0D0D0D;border-radius:8px;padding:7px 10px;}
.an-item-text{background:#0D0D0D;border-radius:8px;padding:7px 10px;margin-bottom:6px;}
/* ── Light mode ──────────────────────────────────────────── */
.theme-light body{background:#F0F0EC;}
.theme-light .modal{background:#fff;border-color:rgba(201,168,0,0.4);}
.theme-light .isel{background:#F5F5F5;color:#111;border-color:#CCC;}
.theme-light .overlay{background:rgba(0,0,0,0.6);}
.theme-light .perim-cell{background:#F5F5F0;border-color:#E0E0E0;}
.theme-light .perim-value{color:#111;}
.theme-light .perim-label{color:#888;}
.theme-light .hist-card{background:#F5F5F0;border-color:#E0E0E0;}
.theme-light .metric-row{border-bottom-color:#F0F0F0;}
.theme-light .chart-cell{background:#F5F5F0;border-color:#E0E0E0;}
.theme-light .cmp-card{background:#F5F5F0;border-color:#E0E0E0;}
.theme-light .an-item{background:#F5F5F0;}
.theme-light .an-item-text{background:#F5F5F0;}
.theme-light .sec-title{border-bottom-color:#E0E0E0;}
.theme-light th{background:#F0F0EC;color:#888;}
.theme-light tr.odd{background:#F9F9F9;}
.theme-light tr.even{background:#F4F4F4;}
.theme-light td{color:#222;}
.theme-light .btn-sm{background:#F0F0EC;}
.theme-light .btn-outline{color:#666;border-color:#CCC;}
.theme-light .flabel{color:#888;}
.theme-light .pill-btn{border-color:#CCC;background:#F0F0EC;color:#888;}
.theme-light .rating-btn{border-color:#CCC;background:#F0F0EC;color:#888;}
/* ── PDF overlay ─────────────────────────────────────────── */
#pdf-overlay{position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pdf-noprint{}
@media print{.pdf-noprint{display:none!important;}}

</style>

</head>
<body>
<div id="shell">

// ── UTILS ──────────────────────────────────────────────────
function fmt(n, d) {
  if (n == null || n === "") return "—";
  var dec = (d == null) ? 1 : d;
  return Number(n).toLocaleString("pt-BR", { maximumFractionDigits: dec });
}
function parseDate(s) {
  if (!s) return new Date(0);
  var p = s.split("/");
  if (p.length < 3) return new Date(0);
  return new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
}
function todayStr() {
  var t = new Date();
  return String(t.getDate()).padStart(2,"0") + "/" + String(t.getMonth()+1).padStart(2,"0") + "/" + t.getFullYear();
}
function uniq(arr) {
  var seen = {}, out = [];
  for (var i = 0; i < arr.length; i++) {
    if (!seen[arr[i]]) { seen[arr[i]] = true; out.push(arr[i]); }
  }
  return out.sort();
}
function getInitials(name) {
  if (!name) return "?";
  var parts = name.trim().split(" ");
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function calcIdade(dataNasc) {
  if (!dataNasc) return null;
  var d = parseDate(dataNasc);
  if (d.getTime() === 0) return null;
  var today = new Date();
  var age = today.getFullYear() - d.getFullYear();
  var m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}
function isBirthdayToday(dataNasc) {
  if (!dataNasc) return false;
  var d = parseDate(dataNasc);
  var today = new Date();
  return d.getDate() === today.getDate() && d.getMonth() === today.getMonth();
}

// ── DOM helpers ────────────────────────────────────────────
function el(tag, attrs, children) {
  var d = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      if (k === "cls") { d.className = attrs[k]; }
      else if (k === "html") { d.innerHTML = attrs[k]; }
      else if (k === "style" && typeof attrs[k] === "object") { Object.assign(d.style, attrs[k]); }
      else if (k.indexOf("on") === 0) { d.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
      else { d[k] = attrs[k]; }
    }
  }
  if (children) {
    var arr = Array.isArray(children) ? children : [children];
    for (var i = 0; i < arr.length; i++) {
      var c = arr[i];
      if (c == null || c === false) continue;
      if (typeof c === "string") { d.appendChild(document.createTextNode(c)); }
      else { d.appendChild(c); }
    }
  }
  return d;
}
function mkSel(attrs, opts) {
  var s = el("select", attrs);
  for (var i = 0; i < opts.length; i++) {
    var op = document.createElement("option");
    op.value = (opts[i].v != null) ? opts[i].v : opts[i].l;
    op.textContent = opts[i].l;
    s.appendChild(op);
  }
  return s;
}
function mkInput(type, attrs) {
  return el("input", Object.assign({ type: type, cls: "isel" }, attrs || {}));
}
function mkField(labelTxt, inputEl, span) {
  var w = el("div", span ? { cls: "full" } : null);

  w.appendChild(inputEl);
  return w;
}

}

}

  }

}

// ── SVG LINE CHART ─────────────────────────────────────────
function svgLine(container, points, unit) {
  container.innerHTML = "";
  var pts = [];
  for (var i=0;i<points.length;i++){
    var p=points[i];
    if(p.v!=null&&p.v!==""&&!isNaN(Number(p.v)))pts.push({d:p.d,v:Number(p.v)});
  }
  pts.sort(function(a,b){return parseDate(a.d)-parseDate(b.d);});
  if(pts.length<2){container.innerHTML="<div style='color:#444;font-size:10px;padding:8px;text-align:center'>Min. 2 registos</div>";return;}
  var W=container.offsetWidth||280,H=80,PL=32,PR=8,PT=14,PB=20;
  var cw=W-PL-PR,ch=H-PT-PB;
  var vals=pts.map(function(p){return p.v;});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  if(minV===maxV){minV=Math.max(0,minV-1);maxV=maxV+1;}
  var rng=maxV-minV;
  minV=Math.max(0,minV-rng*0.1);maxV=maxV+rng*0.1;
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",W);svg.setAttribute("height",H);
  svg.style.display="block";svg.style.width="100%";
  function xp(i){return PL+i*(cw/(pts.length-1));}
  function yp(v){return PT+ch-((v-minV)/(maxV-minV))*ch;}
  for(var g=0;g<=2;g++){
    var gy=PT+g*(ch/2),gv=maxV-g*(maxV-minV)/2;
    var gl=document.createElementNS(ns,"line");
    gl.setAttribute("x1",PL);gl.setAttribute("y1",gy);gl.setAttribute("x2",PL+cw);gl.setAttribute("y2",gy);
    gl.setAttribute("stroke","#1E1E1E");gl.setAttribute("stroke-dasharray","2,3");
    svg.appendChild(gl);
    var gt=document.createElementNS(ns,"text");
    gt.setAttribute("x",PL-3);gt.setAttribute("y",gy+3);
    gt.setAttribute("text-anchor","end");gt.setAttribute("font-size","7");gt.setAttribute("fill","#444");
    gt.textContent=fmt(gv,0);
    svg.appendChild(gt);
  }
  var apath="M "+xp(0)+" "+(PT+ch);
  for(var i=0;i<pts.length;i++)apath+=" L "+xp(i)+" "+yp(pts[i].v);
  apath+=" L "+xp(pts.length-1)+" "+(PT+ch)+" Z";
  var af=document.createElementNS(ns,"path");
  af.setAttribute("d",apath);af.setAttribute("fill","#C9A800");af.setAttribute("opacity","0.12");
  svg.appendChild(af);
  var lpath="M "+xp(0)+" "+yp(pts[0].v);
  for(var i=1;i<pts.length;i++)lpath+=" L "+xp(i)+" "+yp(pts[i].v);
  var lp=document.createElementNS(ns,"path");
  lp.setAttribute("d",lpath);lp.setAttribute("fill","none");lp.setAttribute("stroke","#C9A800");lp.setAttribute("stroke-width","2");
  svg.appendChild(lp);
  for(var i=0;i<pts.length;i++){
    var cx2=xp(i),cy2=yp(pts[i].v);
    var c1=document.createElementNS(ns,"circle");
    c1.setAttribute("cx",cx2);c1.setAttribute("cy",cy2);c1.setAttribute("r","4");
    c1.setAttribute("fill","#0A0A0A");c1.setAttribute("stroke","#C9A800");c1.setAttribute("stroke-width","2");
    svg.appendChild(c1);
    var vt=document.createElementNS(ns,"text");
    vt.setAttribute("x",cx2);vt.setAttribute("y",cy2-6);
    vt.setAttribute("text-anchor","middle");vt.setAttribute("font-size","7");vt.setAttribute("fill","#C9A800");
    vt.setAttribute("font-weight","700");
    vt.textContent=fmt(pts[i].v,1)+(unit||"");
    svg.appendChild(vt);
    var xparts=pts[i].d.split("/");
    var xt=document.createElementNS(ns,"text");
    xt.setAttribute("x",cx2);xt.setAttribute("y",H-3);
    xt.setAttribute("text-anchor","middle");xt.setAttribute("font-size","7");xt.setAttribute("fill","#444");
    xt.textContent=(xparts[0]||"")+"/"+(xparts[1]||"");
    svg.appendChild(xt);
  }
  container.appendChild(svg);
}

    var serieN=1;
    var sg2=el("div",{cls:"grid3"});
    var iSerieN=mkInput("number",{value:"1",min:"1"});
    var iRepsN=mkInput("number",{value:"12",min:"1"});
    var iPesoN=mkInput("number",{step:"0.5",min:"0",placeholder:"0"});

        tr.appendChild(el("td",{style:{maxWidth:"90px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[r.exercicio]));
        tr.appendChild(el("td",{style:{textAlign:"center"}},[r.treino]));
        tr.appendChild(el("td",{style:{textAlign:"center"}},[String(r.serie)]));
        tr.appendChild(el("td",{style:{textAlign:"center"}},[String(r.reps)]));
        tr.appendChild(el("td",null,[el("span",{style:{fontWeight:"700",color:"#C9A800"}},[r.peso+"kg"]),prTag]));
        (function(rid){
          var xb=el("button",{style:{background:"none",border:"none",color:"#E74C3C",cursor:"pointer",fontSize:"13px",padding:"0 4px"}},["X"]);
          xb.addEventListener("click",function(){rows=rows.filter(function(x){return x.id!==rid;});renderRows();});
          tr.appendChild(el("td",{style:{textAlign:"center"}},[xb]));
        })(r.id);
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);rowsTable.appendChild(tbl);
    }

    function addRow(){
      var aluno=sAluno.value==="__novo__"?iNovoAluno.value.trim():sAluno.value;
      var ex=sEx.value==="__novo__"?iNovoEx.value.trim():sEx.value;
      if(!iData.value||!aluno||!ex||!iPesoN.value){errDiv.textContent="Preencha: data, aluno, exercicio e peso.";return;}
      if(!/^\d{2}\/\d{2}\/\d{4}$/.test(iData.value)){errDiv.textContent="Data: DD/MM/AAAA";return;}
      errDiv.textContent="";
      rows.push({id:genId(),data:iData.value,aluno:aluno,treino:sTreino.value,exercicio:ex,serie:Number(iSerieN.value),reps:Number(iRepsN.value),peso:Number(iPesoN.value)});
      iSerieN.value=String(Number(iSerieN.value)+1);iPesoN.value="";
      renderRows();
    }
    iPesoN.addEventListener("keydown",function(e){if(e.key==="Enter")addRow();});
    var addBtn=el("button",{cls:"btn-gold btn-press",style:{width:"100%",marginTop:"10px"}},["+ Adicionar Série"]);
    addBtn.addEventListener("click",addRow);

        for(var j=0;j<DB.clientes.length;j++){if(DB.clientes[j].nome===rAluno){found=true;break;}}

      }

    }},["Guardar ("+rows.length+")"]));
    modal.appendChild(foot2);
  }

  document.getElementById("app").appendChild(ov);

  modal.appendChild(el("div", { cls: "modal-hdr" }, [
    el("div", { style: { fontSize: "14px", fontWeight: "800" } },
      [(isEdit ? "Editar Anamnese" : "Nova Anamnese") + " — " + cliente.nome]),
    el("button", { cls: "btn-outline btn-press", onClick: function() { ov.remove(); } }, ["X"])
  ]));

  // Data
  var g0 = el("div", { cls: "grid2", style: { marginBottom: "12px" } });
  var iData = mkInput("text", { placeholder: "DD/MM/AAAA", value: an.dataAn });
  iData.addEventListener("input", function(e) { an.dataAn = e.target.value; });
  g0.appendChild(mkField("Data", iData));
  modal.appendChild(g0);

  // Helper: text input with char limit
  function mkText(field, placeholder, maxlen) {
    var max = maxlen || 200;
    var inp = el("textarea", { cls: "isel", style: { resize: "none", height: "52px", fontSize: "12px" } });
    inp.placeholder = placeholder;
    inp.maxLength = max;
    inp.value = an[field] || "";
    inp.addEventListener("input", function(e) { an[field] = e.target.value; });
    return inp;
  }

  // Helper: radio/pill selector
  function mkPills(field, options) {
    var wrap = el("div", { style: { display: "flex", flexWrap: "wrap", gap: "5px", marginTop: "2px" } });
    options.forEach(function(opt) {
      var isActive = an[field] === opt;
      var btn = el("button", { cls: "pill-btn btn-press" + (isActive ? " active" : "") }, [opt]);
      (function(o) {
        btn.addEventListener("click", function() {
          an[field] = o;
          var btns = wrap.children;
          for (var i = 0; i < btns.length; i++) {
            if (btns[i].textContent === o) {
              btns[i].className = "pill-btn btn-press active";
            } else {
              btns[i].className = "pill-btn btn-press";
            }
          }
        });
      })(opt);
      wrap.appendChild(btn);
    });
    return wrap;
  }

  // Helper: star/number rating
  function mkRating(field, max) {
    var wrap = el("div", { style: { display: "flex", gap: "4px", marginTop: "2px", flexWrap: "wrap" } });
    for (var n = 1; n <= max; n++) {
      var isActive = String(an[field]) === String(n);
      var btn = el("button", { cls: "rating-btn btn-press" + (isActive ? " active" : "") }, [String(n)]);
      (function(val) {
        btn.addEventListener("click", function() {
          an[field] = val;
          var btns = wrap.children;
          for (var i = 0; i < btns.length; i++) {
            if (String(i + 1) === String(val)) {
              btns[i].className = "rating-btn btn-press active";
            } else {
              btns[i].className = "rating-btn btn-press";
            }
          }
        });
      })(n);
      wrap.appendChild(btn);
    }
    return wrap;
  }

  function sec(title) {
    return el("div", { cls: "sec-title", style: { margin: "14px 0 8px" } }, [title]);
  }

  // ── 1. Saúde
  modal.appendChild(sec("1. Saúde e Histórico"));
  var g1 = el("div", { cls: "grid2" });

  // Helper: pill + conditional text reveal
  function mkPillReveal(pillField, detailField, label, detailLabel) {
    var wrap = el("div", { cls: "full" });
    wrap.appendChild(el("div", { cls: "flabel" }, [label]));
    var pillRow = mkPills(pillField, ["Não", "Sim"]);
    wrap.appendChild(pillRow);
    var detail = el("div", { style: { marginTop: "6px", display: an[pillField] === "Sim" ? "block" : "none" } });
    var ta = mkText(detailField, detailLabel + " (max 200)...", 200);
    detail.appendChild(ta);
    wrap.appendChild(detail);
    // Override mkPills click to also toggle detail visibility
    var pillBtns = pillRow.children;
    for (var pi = 0; pi < pillBtns.length; pi++) {
      (function(btn, val) {
        btn.addEventListener("click", function() {
          detail.style.display = val === "Sim" ? "block" : "none";
        });
      })(pillBtns[pi], pillBtns[pi].textContent);
    }
    return wrap;
  }

  g1.appendChild(mkPillReveal("doencas", "doencasDetalhe", "Doença diagnosticada?", "Qual doença"));
  g1.appendChild(mkPillReveal("medicamentos", "medicamentosDetalhe", "Usa medicamentos?", "Quais medicamentos"));
  g1.appendChild(mkPillReveal("lesoes", "lesoesDetalhe", "Lesões ou cirurgias?", "Descreve a lesão"));
  g1.appendChild(mkPillReveal("dores", "doresDetalhe", "Sente dores?", "Onde e quando"));
  g1.appendChild(mkField("Liberação médica para treinar?", mkPills("liberacaoMedica", ["Sim", "Não", "Não tenho"]), true));
  modal.appendChild(g1);

  // ── 2. Objetivos
  modal.appendChild(sec("2. Objetivos"));
  var g2 = el("div", { cls: "grid2" });
  g2.appendChild(mkField("Objetivo principal?", mkPills("objetivo", ["Emagrecer", "Hipertrofia", "Saúde", "Resistência", "Reabilitação"])));
  g2.appendChild(mkField("Prazo para resultados?", mkPills("prazo", ["1 mês", "3 meses", "6 meses", "1 ano", "Sem prazo"])));
  g2.appendChild(mkField("O que mais te incomoda?", mkText("incomodo", "Descreve...", 200), true));
  modal.appendChild(g2);

  // ── 3. Rotina
  modal.appendChild(sec("3. Rotina"));
  var g3 = el("div", { cls: "grid2" });
  g3.appendChild(mkField("Dias por semana para treinar?", mkPills("diasTreino", ["2", "3", "4", "5", "6"])));
  g3.appendChild(mkField("Tipo de trabalho?", mkPills("tipoTrabalho", ["Sentado", "Em pé", "Ativo", "Misto"])));
  g3.appendChild(mkField("Melhor horário?", mkPills("horario", ["Manhã", "Tarde", "Noite", "Variável"])));
  modal.appendChild(g3);

  // ── 4. Hábitos
  modal.appendChild(sec("4. Hábitos"));
  var g4 = el("div", { cls: "grid2" });
  g4.appendChild(mkField("Alimentação (1=péssima, 5=ótima)", mkRating("alimentacao", 5)));
  g4.appendChild(mkField("Horas de sono?", mkPills("sono", ["< 5h", "5-6h", "6-7h", "7-8h", "> 8h"])));
  g4.appendChild(mkField("Nível de estresse?", mkRating("estresse", 5)));
  g4.appendChild(mkField("Consome álcool?", mkPills("alcool", ["Não", "Raramente", "Fim de semana", "Frequente"])));
  modal.appendChild(g4);

  // ── 5. Histórico de treino
  modal.appendChild(sec("5. Histórico de Treino"));
  var g5 = el("div", { cls: "grid2" });
  g5.appendChild(mkField("Já treinou antes?", mkPills("jaTreinou", ["Não", "Sim"])));
  g5.appendChild(mkField("Por quanto tempo?", mkPills("tempoTreino", ["< 3 meses", "3-6 meses", "6m-1 ano", "> 1 ano", "N/A"])));
  g5.appendChild(mkField("Por que parou?", mkText("motivoParou", "Motivo...", 200), true));
  g5.appendChild(mkField("Dificuldades em exercícios?", mkText("dificuldade", "Descreve...", 200), true));
  modal.appendChild(g5);

  // ── 6. Comprometimento
  modal.appendChild(sec("6. Comprometimento"));
  var g6 = el("div", { cls: "grid2" });
  g6.appendChild(mkField("Comprometimento (0 a 10)", mkRating("comprometimento", 10), true));
  g6.appendChild(mkField("Por que não é menor?", mkText("motivoComprometimento", "Explica...", 200), true));
  modal.appendChild(g6);

  // Botões
  var foot = el("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "14px" } });
  if (isEdit) {
    foot.appendChild(el("button", { cls: "btn-red btn-press", onClick: function() {
      if (!confirm("Excluir anamnese?")) return;
      cliente.anamneses = (cliente.anamneses || []).filter(function(x) { return x.id !== an.id; });
      saveDB(); ov.remove(); renderApp();
    } }, ["Excluir"]));
  } else {
    foot.appendChild(el("div"));
  }
  foot.appendChild(el("div", { style: { display: "flex", gap: "8px" } }, [
    el("button", { cls: "btn-outline btn-press", onClick: function() { ov.remove(); } }, ["Cancelar"]),
    el("button", { cls: "btn-gold btn-press", onClick: function() {
      if (!an.dataAn) { alert("Data obrigatória."); return; }
      if (!cliente.anamneses) cliente.anamneses = [];
      if (isEdit) {
        for (var i = 0; i < cliente.anamneses.length; i++) {
          if (cliente.anamneses[i].id === an.id) { cliente.anamneses[i] = an; break; }
        }
      } else {
        cliente.anamneses.push(an);
      }
      saveDB(); ov.remove();
      STATE.tab = "anamnese"; STATE.clienteId = cliente.id;
      renderApp();
    } }, ["Guardar"])
  ]));
  modal.appendChild(foot);
  ov.appendChild(modal);
  document.getElementById("app").appendChild(ov);
}

// ── PDF EXPORT ─────────────────────────────────────────────
function exportPDF(cliente,avIndex){
  var avs=cliente.avaliacoes||[];
  if(!avs.length){alert("Sem avaliacoes para exportar.");return;}
  var idx=(avIndex!=null)?avIndex:avs.length-1;
  var av=avs[idx];
  var sexo=cliente.sexo||"M";
  var sbg={ok:"#e8f5e9",warn:"#fff8e1",bad:"#ffebee"};
  var scol={ok:"#2e7d32",warn:"#e65100",bad:"#c62828"};
  function mrow(label,val,cls,classLabel,ref){
    var bc=sbg[cls]||"#f5f5f5",fc=scol[cls]||"#333";
    return "<tr><td style='padding:6px 8px;font-size:11px;color:#555;border-bottom:1px solid #f0f0f0;'>"+label+"</td><td style='padding:6px 8px;font-size:11px;font-weight:700;border-bottom:1px solid #f0f0f0;'>"+val+"</td><td style='padding:6px 8px;font-size:10px;color:#888;border-bottom:1px solid #f0f0f0;'>"+(ref||"")+"</td><td style='padding:4px 6px;border-bottom:1px solid #f0f0f0;'>"+(classLabel?"<span style='background:"+bc+";color:"+fc+";border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;'>"+classLabel+"</span>":"")+"</td></tr>";
  }
  var rows="";
  if(av.imc){var r1=cImc(av.imc);rows+=mrow("IMC",av.imc+" kg/m2",r1.cls,r1.label,"Ideal: 18.5-24.9");}
  if(av.massaGorda){var r2=cGordura(av.massaGorda,sexo);rows+=mrow("Massa Gorda",av.massaGorda+"%",r2.cls,r2.label,"Ideal: "+(sexo==="F"?"14-24%":"6-17%"));}
  if(av.massaMagra)rows+=mrow("Massa Magra",av.massaMagra+" kg","ok","","");
  if(av.gorduraVisceral){var r3=cVisceral(av.gorduraVisceral);rows+=mrow("Gordura Visceral","Nivel "+av.gorduraVisceral,r3.cls,r3.label,"Ideal: 1-9");}
  if(av.aguaCorporal){var r4=cAgua(av.aguaCorporal,sexo);rows+=mrow("Água Corporal",av.aguaCorporal+"%",r4.cls,r4.label,"Ideal: "+(sexo==="F"?"45-60%":"50-65%"));}
  if(av.tmb)rows+=mrow("Taxa Metab. Basal",av.tmb+" kcal","ok","","");
  if(av.idadeMetab)rows+=mrow("Idade Metabólica",av.idadeMetab+" anos","ok","","");
  if(av.pressaoSist&&av.pressaoDiast){var r5=cPressao(av.pressaoSist,av.pressaoDiast);rows+=mrow("Pressão Arterial",av.pressaoSist+"/"+av.pressaoDiast+" mmHg",r5.cls,r5.label,"Ideal: < 120/80");}

  // ── Avatar SVG — redesigned, no crossing lines, M/F silhouettes
  var AW = 560, AH = 520;
  var isFemale = (sexo === "F");

  // Only show measurements that have values
  var pmap = {
    ombro: av.ombro, torax: av.torax, abdomen: av.abdomen,
    cintura: av.cintura, anca: av.anca,
    coxaD: av.coxaD, coxaE: av.coxaE,
    bracoRD: av.bracoRD, bracoRE: av.bracoRE,
    gemeoD: av.gemeoD, gemeoE: av.gemeoE
  };

  // Layout: avatar centred at x=280
  // RIGHT column (x=370+): ombro, torax, abdomen, cintura, anca — spaced 44px apart, NO crossing
  // LEFT column (x=0-120): coxa D, coxa E, gemeo D, gemeo E — spaced 38px apart
  // Arm labels: bracoRD and bracoRE on right side below anca

  var svg = '<svg width="' + AW + '" height="' + AH + '" viewBox="0 0 ' + AW + ' ' + AH + '" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;font-family:Arial,sans-serif;">';
  svg += '<rect width="' + AW + '" height="' + AH + '" fill="#f8f6f0" rx="10"/>';
  svg += '<text x="' + (AW/2) + '" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#A88900" letter-spacing="3">FICHA DE PERÍMETROS</text>';

  // ── Body centre x
  var bx = 280;

  // ── FEMALE silhouette (SVG path — elegant curves)
  if (isFemale) {
    // Head
    svg += '<ellipse cx="' + bx + '" cy="62" rx="21" ry="24" fill="#2a2a2a"/>';
    // Hair suggestion
    svg += '<ellipse cx="' + bx + '" cy="42" rx="23" ry="10" fill="#1a1a1a"/>';
    // Neck
    svg += '<rect x="' + (bx-7) + '" y="83" width="14" height="12" fill="#2a2a2a"/>';
    // Shoulders — narrower for female
    svg += '<path d="M ' + (bx-42) + ' 100 Q ' + (bx-22) + ' 91 ' + bx + ' 93 Q ' + (bx+22) + ' 91 ' + (bx+42) + ' 100 L ' + (bx+40) + ' 114 Q ' + (bx+20) + ' 104 ' + bx + ' 105 Q ' + (bx-20) + ' 104 ' + (bx-40) + ' 114 Z" fill="#2a2a2a"/>';
    // Torso — hourglass female shape
    svg += '<path d="M ' + (bx-34) + ' 100 Q ' + (bx-36) + ' 130 ' + (bx-28) + ' 155 Q ' + (bx-22) + ' 175 ' + (bx-32) + ' 200 L ' + (bx+32) + ' 200 Q ' + (bx+22) + ' 175 ' + (bx+28) + ' 155 Q ' + (bx+36) + ' 130 ' + (bx+34) + ' 100 Z" fill="#222"/>';
    // Arms — slim
    svg += '<path d="M ' + (bx-34) + ' 102 L ' + (bx-46) + ' 105 Q ' + (bx-54) + ' 120 ' + (bx-56) + ' 170 L ' + (bx-44) + ' 171 Q ' + (bx-44) + ' 128 ' + (bx-36) + ' 115 Z" fill="#2a2a2a" rx="5"/>';
    svg += '<path d="M ' + (bx+34) + ' 102 L ' + (bx+46) + ' 105 Q ' + (bx+54) + ' 120 ' + (bx+56) + ' 170 L ' + (bx+44) + ' 171 Q ' + (bx+44) + ' 128 ' + (bx+36) + ' 115 Z" fill="#2a2a2a" rx="5"/>';
    // Hands
    svg += '<ellipse cx="' + (bx-50) + '" cy="177" rx="8" ry="10" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+50) + '" cy="177" rx="8" ry="10" fill="#2a2a2a"/>';
    // Hips — wider for female
    svg += '<path d="M ' + (bx-32) + ' 198 Q ' + (bx-44) + ' 205 ' + (bx-42) + ' 225 L ' + (bx+42) + ' 225 Q ' + (bx+44) + ' 205 ' + (bx+32) + ' 198 Z" fill="#222"/>';
    // Thighs
    svg += '<rect x="' + (bx-42) + '" y="223" width="34" height="75" rx="10" fill="#222"/>';
    svg += '<rect x="' + (bx+8) + '" y="223" width="34" height="75" rx="10" fill="#222"/>';
    // Calves
    svg += '<path d="M ' + (bx-40) + ' 296 Q ' + (bx-42) + ' 330 ' + (bx-34) + ' 360 L ' + (bx-20) + ' 360 Q ' + (bx-18) + ' 330 ' + (bx-20) + ' 296 Z" fill="#2a2a2a"/>';
    svg += '<path d="M ' + (bx+20) + ' 296 Q ' + (bx+18) + ' 330 ' + (bx+20) + ' 360 L ' + (bx+34) + ' 360 Q ' + (bx+42) + ' 330 ' + (bx+40) + ' 296 Z" fill="#2a2a2a"/>';
    // Feet
    svg += '<ellipse cx="' + (bx-27) + '" cy="368" rx="14" ry="9" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+27) + '" cy="368" rx="14" ry="9" fill="#2a2a2a"/>';
  } else {
    // ── MALE silhouette — broader shoulders, straighter torso
    // Head
    svg += '<ellipse cx="' + bx + '" cy="60" rx="23" ry="25" fill="#2a2a2a"/>';
    // Neck
    svg += '<rect x="' + (bx-9) + '" y="82" width="18" height="13" fill="#2a2a2a"/>';
    // Shoulders — broad
    svg += '<path d="M ' + (bx-52) + ' 102 Q ' + (bx-28) + ' 88 ' + bx + ' 91 Q ' + (bx+28) + ' 88 ' + (bx+52) + ' 102 L ' + (bx+50) + ' 118 Q ' + (bx+26) + ' 105 ' + bx + ' 106 Q ' + (bx-26) + ' 105 ' + (bx-50) + ' 118 Z" fill="#2a2a2a"/>';
    // Torso — straight/athletic
    svg += '<path d="M ' + (bx-38) + ' 102 Q ' + (bx-36) + ' 150 ' + (bx-30) + ' 198 L ' + (bx+30) + ' 198 Q ' + (bx+36) + ' 150 ' + (bx+38) + ' 102 Z" fill="#222"/>';
    // Arms — bulkier
    svg += '<path d="M ' + (bx-38) + ' 104 L ' + (bx-52) + ' 107 Q ' + (bx-60) + ' 130 ' + (bx-60) + ' 172 L ' + (bx-46) + ' 172 Q ' + (bx-47) + ' 134 ' + (bx-40) + ' 116 Z" fill="#2a2a2a"/>';
    svg += '<path d="M ' + (bx+38) + ' 104 L ' + (bx+52) + ' 107 Q ' + (bx+60) + ' 130 ' + (bx+60) + ' 172 L ' + (bx+46) + ' 172 Q ' + (bx+47) + ' 134 ' + (bx+40) + ' 116 Z" fill="#2a2a2a"/>';
    // Hands
    svg += '<ellipse cx="' + (bx-53) + '" cy="179" rx="9" ry="11" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+53) + '" cy="179" rx="9" ry="11" fill="#2a2a2a"/>';
    // Hips
    svg += '<path d="M ' + (bx-30) + ' 196 L ' + (bx+30) + ' 196 Q ' + (bx+34) + ' 216 ' + (bx+36) + ' 226 L ' + (bx-36) + ' 226 Q ' + (bx-34) + ' 216 ' + (bx-30) + ' 196 Z" fill="#222"/>';
    // Thighs
    svg += '<rect x="' + (bx-36) + '" y="224" width="30" height="78" rx="9" fill="#222"/>';
    svg += '<rect x="' + (bx+6) + '" y="224" width="30" height="78" rx="9" fill="#222"/>';
    // Calves
    svg += '<rect x="' + (bx-34) + '" y="300" width="26" height="68" rx="7" fill="#2a2a2a"/>';
    svg += '<rect x="' + (bx+8) + '" y="300" width="26" height="68" rx="7" fill="#2a2a2a"/>';
    // Feet
    svg += '<ellipse cx="' + (bx-21) + '" cy="374" rx="16" ry="8" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+21) + '" cy="374" rx="16" ry="8" fill="#2a2a2a"/>';
  }

  // ── Label box helper — clean, no overlap
  var lbFn = function(x, y, title, val, anchor) {
    if (!val || Number(val) === 0) return '';
    var bw = 94, bh = 34;
    var bx2 = (anchor === 'end') ? x - bw : x;
    var r = '<rect x="' + bx2 + '" y="' + (y - bh/2) + '" width="' + bw + '" height="' + bh + '" rx="6" fill="#fff8e8" stroke="#C9A800" stroke-width="1"/>';
    r += '<text x="' + (bx2 + bw/2) + '" y="' + (y - 5) + '" text-anchor="middle" font-size="7.5" font-weight="700" fill="#A88900">' + title + '</text>';
    r += '<text x="' + (bx2 + bw/2) + '" y="' + (y + 9) + '" text-anchor="middle" font-size="11" font-weight="900" fill="#222">' + val + ' cm</text>';
    return r;
  };

  // ── Connector dot + line helper
  var cnFn = function(lx, ly, anchor, tx, ty) {
    var lineEndX = (anchor === 'end') ? lx : lx + 94;
    return '<line x1="' + lineEndX + '" y1="' + ly + '" x2="' + tx + '" y2="' + ty + '" stroke="#C9A800" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>'
      + '<circle cx="' + tx + '" cy="' + ty + '" r="3.5" fill="#C9A800"/>';
  };

  // ── RIGHT side labels — strictly top to bottom, no crossing
  // Each label connects to a UNIQUE horizontal band on the body
  // Body points (rx = right edge of body at that y):
  // ombro y=106 -> body right x ~ bx+42
  // torax y=130 -> body right x ~ bx+36
  // abdomen y=155 -> body right x ~ bx+30
  // cintura y=175 -> body right x ~ bx+28
  // anca y=210 -> body right x ~ bx+38
  // bracoRD y=130 -> arm right x ~ bx+58 (arm zone)
  // bracoRE y=155 -> arm right x ~ bx+57

  var RX = 372; // left edge of right label column

  // Collect right labels in fixed vertical order
  var rightLabels = [];
  if (pmap.ombro) rightLabels.push({t:"OMBRO", v:pmap.ombro, bodyX: bx+42, bodyY:106});
  if (pmap.torax) rightLabels.push({t:"TÓRAX", v:pmap.torax, bodyX: bx+36, bodyY:128});
  if (pmap.bracoRD) rightLabels.push({t:"BRAÇO DIR.", v:pmap.bracoRD, bodyX: bx+58, bodyY:145});
  if (pmap.bracoRE) rightLabels.push({t:"BRAÇO ESQ.", v:pmap.bracoRE, bodyX: bx+56, bodyY:162});
  if (pmap.abdomen) rightLabels.push({t:"ABDÓMEN", v:pmap.abdomen, bodyX: bx+30, bodyY:155});
  if (pmap.cintura) rightLabels.push({t:"CINTURA", v:pmap.cintura, bodyX: bx+28, bodyY:175});
  if (pmap.anca) rightLabels.push({t:"ANCA/GLÚTEOS", v:pmap.anca, bodyX: bx+38, bodyY:210});

  // Assign label Y positions spaced 40px apart starting at 100, adjusted to avoid overlap
  var rStartY = 100;
  var rStep = Math.min(42, (AH - 60 - rStartY) / Math.max(rightLabels.length, 1));
  for (var i = 0; i < rightLabels.length; i++) {
    var lbl = rightLabels[i];
    var labelY = rStartY + i * rStep + 17;
    svg += cnFn(RX, labelY, 'start', lbl.bodyX, lbl.bodyY);
    svg += lbFn(RX, labelY, lbl.t, lbl.v, 'start');
  }

  // ── LEFT side labels — coxa D, coxa E, gemeo D, gemeo E
  var LX = 108; // right edge of left label column

  var leftLabels = [];
  if (pmap.coxaD) leftLabels.push({t:"COXA DIR.", v:pmap.coxaD, bodyX: bx-22, bodyY:255});
  if (pmap.coxaE) leftLabels.push({t:"COXA ESQ.", v:pmap.coxaE, bodyX: bx+22, bodyY:270});
  if (pmap.gemeoD) leftLabels.push({t:"GÉMEO DIR.", v:pmap.gemeoD, bodyX: bx-21, bodyY:320});
  if (pmap.gemeoE) leftLabels.push({t:"GÉMEO ESQ.", v:pmap.gemeoE, bodyX: bx+21, bodyY:338});

        hcard.appendChild(el("button", { cls: "btn-sm btn-press", onClick: function() { showModalAnamnese(cliente, anRec); } }, ["Editar"]));
      })(an2);
      hist.appendChild(hcard);
    }
    wrap.appendChild(hist);
  }
}

// ── STATE ──────────────────────────────────────────────────


// ── STATE ──────────────────────────────────────────────────
var STATE = { tab: "clientes", clienteId: null, fAluno: "Todos", fEx: "", metric: "PesoMax", cmp: false, search: "", anamneseId: null };

// Apply saved theme
try { var _t = localStorage.getItem("mr_theme"); if (_t) THEME = _t; } catch(e) {}
applyTheme();

// ── SVG pointer events fix ─────────────────────────────────
// (in CSS: svg{pointer-events:none;})

// ── TOPBAR ─────────────────────────────────────────────────
function buildTopbar() {
  var tb = document.getElementById("topbar");
  tb.innerHTML = "";
  var inner = el("div", { cls: "tb-inner" });

  var brand = el("div", { cls: "tb-brand" });
  var logoEl = el("div", { cls: "tb-logo" });
  if (DB && DB.clientes) {
    // trainer info stored in DB
  }
  logoEl.textContent = "MR";
  brand.appendChild(logoEl);
  var brandTxt = el("div");
  brandTxt.appendChild(el("div", { cls: "tb-name" }, ["MAZINHO RODRIGUES"]));
  brandTxt.appendChild(el("div", { cls: "tb-sub" }, ["Personal Trainer"]));
  brand.appendChild(brandTxt);
  inner.appendChild(brand);

  var right = el("div", { cls: "tb-right" });

  // Theme toggle
  var THEME = "dark";
  try { var t = localStorage.getItem("mr_theme"); if (t) THEME = t; } catch(e) {}
  var themeBtn = el("button", { cls: "btn-press", style: { background: "none", border: "1px solid #1A1A1A", borderRadius: "8px", padding: "6px 10px", cursor: "pointer", lineHeight: "0" } });
  themeBtn.innerHTML = THEME === "dark"
    ? '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#666;fill:none;stroke-width:2;stroke-linecap:round;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#666;fill:none;stroke-width:2;stroke-linecap:round;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  themeBtn.addEventListener("click", function() { toggleTheme(); renderApp(); });
  right.appendChild(themeBtn);

  // Add button based on current tab
  var addBtn = null;
  if (STATE.tab === "treinos" || STATE.tab === "registros") {
    addBtn = el("button", { cls: "btn-gold btn-press", style: { fontSize: "12px", padding: "8px 14px" } }, ["+ Registo"]);
    addBtn.addEventListener("click", function() { showModalTreino(); });
  } else if (STATE.tab === "clientes" || STATE.tab === "perfil") {
    addBtn = el("button", { cls: "btn-gold btn-press", style: { fontSize: "12px", padding: "8px 14px" } }, ["+ Cliente"]);
    addBtn.addEventListener("click", function() { showModalCliente(); });
  } else if (STATE.tab === "anamnese") {
    addBtn = el("button", { cls: "btn-gold btn-press", style: { fontSize: "12px", padding: "8px 14px" } }, ["+ Anamnese"]);
    addBtn.addEventListener("click", function() {
      if (STATE.clienteId) {
        var cl = null;
        for (var i = 0; i < DB.clientes.length; i++) {
          if (DB.clientes[i].id === STATE.clienteId) { cl = DB.clientes[i]; break; }
        }
        if (cl) showModalAnamnese(cl);
      }
    });
  }
  if (addBtn) right.appendChild(addBtn);
  inner.appendChild(right);
  tb.appendChild(inner);

  // Birthday banner
  var birthdays = DB.clientes.filter(function(c) { return isBirthdayToday(c.dataNasc); });
  if (birthdays.length) {
    var bn = el("div", { style: { background: "linear-gradient(135deg,#1E1A00,#2A2200)", borderBottom: "1px solid rgba(201,168,0,0.25)", padding: "7px 18px", fontSize: "12px", color: "var(--accent,#C9A800)", fontWeight: "600" } },
      ["Aniversário hoje: " + birthdays.map(function(c) { return c.nome; }).join(", ") + "!"]);
    tb.appendChild(bn);
  }
}

// ── NAVBAR ──────────────────────────────────────────────────
function buildNavbar() {
  var nb = document.getElementById("navbar");
  nb.innerHTML = "";
  var tabs = [
    { k: "clientes",  icon: IC.users,    lbl: "Clientes"   },
    { k: "perfil",    icon: IC.clipboard,lbl: "Avaliação"  },
    { k: "anamnese",  icon: IC.note,     lbl: "Anamnese"   },
    { k: "treinos",   icon: IC.dumbbell, lbl: "Treinos"    },
    { k: "registros", icon: IC.activity, lbl: "Registros"  }
  ];
  tabs.forEach(function(t) {
    var item = el("div", { cls: "nav-item btn-press" + (STATE.tab === t.k ? " active" : "") });
    var iconWrap = el("div", { cls: "nav-icon" });
    iconWrap.innerHTML = t.icon;
    item.appendChild(iconWrap);
    item.appendChild(el("div", { cls: "nav-label" }, [t.lbl]));
    item.appendChild(el("div", { cls: "nav-dot" }));
    (function(key) {
      item.addEventListener("click", function() {
        STATE.tab = key; STATE.search = "";
        if (key === "treinos" || key === "registros") STATE.fAluno = "Todos";
        renderApp();
      });
    })(t.k);
    nb.appendChild(item);
  });
}

// ── MAIN RENDER ────────────────────────────────────────────
function renderApp() {
  var app = document.getElementById("app");
  // Remove all non-overlay children
  var toRemove = [];
  for (var i = 0; i < app.children.length; i++) {
    if (!app.children[i].classList.contains("overlay") && app.children[i].id !== "pdf-overlay") {
      toRemove.push(app.children[i]);
    }
  }
  for (var i = 0; i < toRemove.length; i++) toRemove[i].remove();

  buildTopbar();
  buildNavbar();

  var content = el("div", { style: { padding: "14px 18px", maxWidth: "430px", margin: "0 auto" } });
  if (STATE.tab === "clientes")   buildClientesView(content);
  else if (STATE.tab === "perfil")    buildPerfilView(content);
  else if (STATE.tab === "anamnese")  buildAnamneseView(content);
  else if (STATE.tab === "treinos")   buildTreinosView(content);
  else if (STATE.tab === "registros") buildRegistrosView(content);
  app.appendChild(content);
}

renderApp();

</script>
