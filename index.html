<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MR Trainer"/>
<meta name="theme-color" content="#C9A800"/>
<title>MR Trainer</title>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0A0A;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:70px;}
select,input,button,textarea{font-family:'Helvetica Neue',Arial,sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#C9A800;border-radius:2px;}

/* ── Transitions ──────────────────────────────────────── */
.fade-in{animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.slide-up{animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.btn-press{transition:transform 0.1s,opacity 0.1s;}
.btn-press:active{transform:scale(0.96);opacity:0.85;}

/* ── Header ───────────────────────────────────────────── */
.hdr{background:#0A0A0A;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{width:46px;height:46px;background:linear-gradient(135deg,#C9A800,#F0C000);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;flex-shrink:0;box-shadow:0 2px 14px rgba(201,168,0,0.35);}
.hdr-avatar{width:38px;height:38px;background:linear-gradient(135deg,#1E1A00,#3A3000);border-radius:50%;border:2px solid #C9A800;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#C9A800;cursor:pointer;}

/* ── Bottom nav bar ───────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0D0D0D;border-top:1px solid #1E1E1E;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.bottom-nav button{flex:1;background:none;border:none;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#444;font-size:9px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;transition:color 0.2s;}
.bottom-nav button.active{color:#C9A800;}
.bottom-nav button svg{width:22px;height:22px;stroke-width:1.8;}
.bottom-nav button.active svg{stroke:#C9A800;}
.bottom-nav button svg{stroke:#444;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bottom-nav button.active .nav-dot{width:4px;height:4px;background:#C9A800;border-radius:50%;margin-top:1px;}
.nav-dot{display:none;}
.bottom-nav button.active .nav-dot{display:block;}

/* ── Tab bar (hidden - replaced by bottom nav) ────────── */
.tabbar{display:none;}

/* ── Typography ───────────────────────────────────────── */
.flabel{font-size:9px;color:#666;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.sec-title{font-size:9px;font-weight:700;color:#C9A800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid #1E1E1E;padding-bottom:7px;}

/* ── Grid ─────────────────────────────────────────────── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:4px;}

/* ── Inputs ───────────────────────────────────────────── */
.isel{background:#141414;color:#fff;border:1px solid #2A2A2A;border-radius:10px;padding:10px 12px;outline:none;width:100%;font-size:13px;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;}
.isel:focus{border-color:#C9A800;box-shadow:0 0 0 3px rgba(201,168,0,0.12);}
.isel::placeholder{color:#444;}

/* ── Badges ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 9px;font-size:9px;font-weight:700;margin-top:3px;letter-spacing:0.3px;}
.ok{background:rgba(76,175,80,0.15);color:#5CB85C;border:1px solid rgba(76,175,80,0.25);}
.warn{background:rgba(255,193,7,0.15);color:#FFC107;border:1px solid rgba(255,193,7,0.25);}
.bad{background:rgba(244,67,54,0.15);color:#E74C3C;border:1px solid rgba(244,67,54,0.25);}

/* ── Buttons ──────────────────────────────────────────── */
.btn-gold{background:linear-gradient(135deg,#C9A800,#E8C840);color:#000;border:none;border-radius:10px;padding:10px 18px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(201,168,0,0.3);transition:transform 0.1s,box-shadow 0.1s;letter-spacing:0.3px;}
.btn-gold:active{transform:scale(0.97);box-shadow:0 1px 5px rgba(201,168,0,0.2);}
.btn-outline{background:none;border:1px solid #2A2A2A;color:#888;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:12px;transition:border-color 0.2s,color 0.2s;}
.btn-outline:active{border-color:#C9A800;color:#C9A800;}
.btn-red{background:none;border:1px solid rgba(244,67,54,0.4);color:#E74C3C;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:12px;}
.btn-sm{background:#161616;border:1px solid rgba(201,168,0,0.3);color:#C9A800;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;transition:background 0.15s;}
.btn-sm:active{background:#1E1A00;}

/* ── Cards ────────────────────────────────────────────── */
.card{background:#111;border:1px solid #1E1E1E;border-radius:14px;padding:14px;}
.card-hover{transition:border-color 0.2s,transform 0.15s;}
.card-hover:active{border-color:#C9A800;transform:scale(0.99);}

/* ── Client avatar ────────────────────────────────────── */
.client-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #2A2A2A;}
.client-avatar-initials{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1E1A00,#2A2200);border:2px solid rgba(201,168,0,0.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#C9A800;flex-shrink:0;letter-spacing:-0.5px;}
.client-avatar-lg{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(201,168,0,0.4);flex-shrink:0;}
.client-avatar-initials-lg{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#1E1A00,#2A2200);border:3px solid rgba(201,168,0,0.4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#C9A800;flex-shrink:0;}

/* ── KPI cards ────────────────────────────────────────── */
.kpi-card{background:linear-gradient(135deg,#111,#0E0E00);border:1px solid #1E1E1E;border-radius:12px;padding:12px 14px;flex:1;min-width:82px;}
.kpi-card.highlight{border-color:rgba(201,168,0,0.3);background:linear-gradient(135deg,#111,#181400);}

/* ── PR badge ─────────────────────────────────────────── */
.pr-badge{background:linear-gradient(135deg,#C9A800,#F5D020);color:#000;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:900;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:3px;}


/* ── Overlay / Modal ──────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.modal{background:#111;border:1px solid rgba(201,168,0,0.4);border-radius:18px;width:100%;max-width:540px;padding:18px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

/* ── Table ────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;}
th{padding:8px 10px;font-size:9px;color:#C9A800;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1E1E1E;text-align:left;background:#0D0D0D;}
td{padding:8px 10px;font-size:11px;}
tr.odd{background:#111;}
tr.even{background:#0D0D0D;}
tr.odd td,tr.even td{border-bottom:1px solid #161616;}
tr.odd:active,tr.even:active{background:#1E1A00;}

/* ── Chart wrap ───────────────────────────────────────── */
.chart-wrap{width:100%;overflow:hidden;}

/* ── Light/dark adaptive cells ──────────────────────────── */
.perim-cell{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:9px;padding:8px;text-align:center;}
.perim-label{font-size:9px;color:#555;margin-bottom:2px;}
.perim-value{font-size:16px;font-weight:700;color:#fff;}
.perim-unit{font-size:9px;color:#C9A800;}
.hist-card{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:10px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #111;}
.chart-cell{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:10px;padding:8px;}

/* ── Light mode overrides ───────────────────────────────── */

/* ── Progress bar ─────────────────────────────────────── */
.progress-bar{height:4px;background:#1E1E1E;border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#C9A800,#F5D020);border-radius:2px;transition:width 0.6s ease;}

/* ── Comparison cards ─────────────────────────────────── */
.cmp-card{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:10px;padding:10px;text-align:center;}
.cmp-up{color:#5CB85C;font-weight:700;}
.cmp-down{color:#E74C3C;font-weight:700;}
.cmp-eq{color:#777;font-weight:700;}

/* ── Pill buttons ─────────────────────────────────────── */
.pill-btn{border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;border:1px solid #2A2A2A;background:#161616;color:#666;transition:background 0.15s,color 0.15s;}
.pill-btn.active{background:#C9A800;color:#000;border-color:#C9A800;font-weight:700;}
.pill-btn:active{opacity:0.8;}

/* ── Rating buttons ───────────────────────────────────── */
.rating-btn{width:30px;height:30px;border-radius:8px;border:1px solid #2A2A2A;background:#161616;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:background 0.15s;}
.rating-btn.active{background:#C9A800;color:#000;border-color:#C9A800;}

/* ── Anamnese view items ──────────────────────────────── */
.an-item{background:#0D0D0D;border-radius:8px;padding:7px 10px;}
.an-item-text{background:#0D0D0D;border-radius:8px;padding:7px 10px;margin-bottom:6px;}

/* ── Theme: Light ──────────────────────────────────────── */
.theme-light body{background:#EEEAE0;color:#111;}

/* Header & Nav */
.theme-light .hdr{background:#EEEAE0;border-bottom:1px solid #DDD8CC;}
.theme-light .hdr-avatar{background:#FFF5C0;border-color:#C9A800;color:#A88900;}
.theme-light .bottom-nav{background:#EEEAE0;border-top:1px solid #DDD8CC;}
.theme-light .bottom-nav button{color:#BBB;}
.theme-light .bottom-nav button.active{color:#A88900;}
.theme-light .bottom-nav button svg{stroke:#BBB;}
.theme-light .bottom-nav button.active svg{stroke:#A88900;}
.theme-light .nav-dot{background:#A88900!important;}

/* Cards — white with soft border */
.theme-light .card{background:#fff;border-color:#E0DDD5;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.theme-light .card-hover:active{border-color:#C9A800;}
.theme-light .kpi-card{background:#111;border-color:#1E1E1E;}
.theme-light .kpi-card.highlight{background:#1A1600;border-color:rgba(201,168,0,0.4);}

/* KPI numbers stay white-on-dark (as in photo 1) */
.theme-light .sec-title{color:#A88900;border-bottom-color:#E0DDD5;}
.theme-light .flabel{color:#999;}

/* Inputs */
.theme-light .isel{background:#fff;color:#111;border-color:#DDD;}
.theme-light .isel:focus{border-color:#C9A800;box-shadow:0 0 0 3px rgba(201,168,0,0.1);}
.theme-light .isel::placeholder{color:#BBB;}
.theme-light textarea.isel{background:#fff;color:#111;border-color:#DDD;}

/* Modal */
.theme-light .modal{background:#fff;border-color:rgba(201,168,0,0.35);}
.theme-light .modal-hdr div{color:#111;}
.theme-light .overlay{background:rgba(0,0,0,0.5);}

/* Buttons */
.theme-light .btn-sm{background:#fff;border:1px solid rgba(201,168,0,0.5);color:#A88900;}
.theme-light .btn-sm:active{background:#FFF8E0;}
.theme-light .btn-outline{color:#666;border-color:#CCC;}
.theme-light .btn-outline:active{border-color:#C9A800;color:#A88900;}
.theme-light .btn-red{border-color:rgba(244,67,54,0.4);color:#C62828;}

/* Pills & Ratings */
.theme-light .pill-btn{background:#F5F2E8;border-color:#DDD;color:#777;}
.theme-light .pill-btn.active{background:#C9A800;color:#000;border-color:#C9A800;}
.theme-light .rating-btn{background:#F5F2E8;border-color:#DDD;color:#777;}
.theme-light .rating-btn.active{background:#C9A800;color:#000;border-color:#C9A800;}

/* Tables */
.theme-light table th{background:#F5F2E8;color:#A88900;}
.theme-light table td{color:#222;}
.theme-light tr.odd{background:#fff;}
.theme-light tr.even{background:#FAF8F3;}
.theme-light tr.odd td,.theme-light tr.even td{border-bottom-color:#EDE8DC;}

/* Metric / perim cells */
.theme-light .perim-cell{background:#fff;border-color:#E0DDD5;}
.theme-light .perim-label{color:#999;}
.theme-light .perim-value{color:#111;}
.theme-light .hist-card{background:#fff;border-color:#E0DDD5;}
.theme-light .metric-row{border-bottom-color:#EDE8DC;}
.theme-light .chart-cell{background:#fff;border-color:#E0DDD5;}
.theme-light .cmp-card{background:#fff;border-color:#E0DDD5;}
.theme-light .an-item{background:#fff;border:1px solid #E0DDD5;}
.theme-light .an-item-text{background:#fff;border:1px solid #E0DDD5;}

/* Avatars — yellow as in photo 2 */
.theme-light .client-avatar-initials{background:linear-gradient(135deg,#FFF5C0,#FFE870);border-color:rgba(201,168,0,0.35);color:#7A6200;}
.theme-light .client-avatar-initials-lg{background:linear-gradient(135deg,#FFF5C0,#FFE870);border-color:rgba(201,168,0,0.4);color:#7A6200;}
.theme-light .client-avatar{border-color:#E0DDD5;}

/* Misc */
.theme-light .pr-badge{background:linear-gradient(135deg,#C9A800,#F5D020);}
.theme-light .progress-bar{background:#E0DDD5;}

/* Metric/compare buttons (treinos) */
.metric-btn{background:#141414;color:#666;border:1px solid #1E1E1E;}
.metric-btn.active{background:#C9A800;color:#000;border-color:#C9A800;font-weight:700;}
.theme-light .metric-btn{background:#F5F2E8;color:#888;border:1px solid #E0DDD5;}
.theme-light .metric-btn.active{background:#C9A800;color:#000;border-color:#C9A800;}

/* KPI cards — keep dark on both themes (matches photos) */
.kpi-card{background:#111;border:1px solid #1E1E1E;border-radius:12px;padding:12px 14px;flex:1;min-width:82px;}
.kpi-card.highlight{border-color:rgba(201,168,0,0.3);background:linear-gradient(135deg,#1A1600,#2A2200);}
.theme-light .kpi-card{background:#fff;border-color:#E0DDD5;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.kpi-val{color:#fff;}
.theme-light .kpi-val{color:#111;}
.theme-light .kpi-card.highlight .kpi-val{color:#A88900;}
.theme-light .kpi-card.highlight{background:#FFFDF0;border-color:rgba(180,140,0,0.35);}

/* Action cards in home */
.theme-light .action-card{background:#fff!important;border:1px solid #E0DDD5!important;color:#111;}
.theme-light .action-card-gold{background:linear-gradient(135deg,#C9A800,#E0B800)!important;border:none!important;}
.theme-light .action-icon-box{background:#F5F2E8!important;}
.theme-light .action-card-gold .action-icon-box{background:rgba(0,0,0,0.15)!important;}
.theme-light .action-title{color:#111!important;}
.theme-light .action-card-gold .action-title{color:#000!important;}
.theme-light .action-sub{color:#888!important;}
.theme-light .action-card-gold .action-sub{color:rgba(0,0,0,0.6)!important;}

/* Search input in light mode */
.theme-light input[type=search],.theme-light input[type=text]{background:#fff;border-color:#E0DDD5;color:#111;}
.theme-light input::placeholder{color:#BBB;}
.theme-light .badge.ok{background:rgba(76,175,80,0.12);color:#2E7D32;border-color:rgba(76,175,80,0.3);}
.theme-light .badge.warn{background:rgba(201,168,0,0.12);color:#A88900;border-color:rgba(201,168,0,0.3);}
.theme-light .badge.bad{background:rgba(244,67,54,0.1);color:#C62828;border-color:rgba(244,67,54,0.25);}
</style>

</head>
<body>
<div id="app"></div>
<script>
// ── UTILS ──────────────────────────────────────────────────
function fmt(n, d) {
  if (n == null || n === "") return "—";
  var dec = (d == null) ? 1 : d;
  return Number(n).toLocaleString("pt-BR", { maximumFractionDigits: dec });
}
function parseDate(s) {
  if (!s) return new Date(0);
  var p = s.split("/");
  if (p.length < 3) return new Date(0);
  return new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
}
function todayStr() {
  var t = new Date();
  return String(t.getDate()).padStart(2,"0") + "/" + String(t.getMonth()+1).padStart(2,"0") + "/" + t.getFullYear();
}
function uniq(arr) {
  var seen = {}, out = [];
  for (var i = 0; i < arr.length; i++) {
    if (!seen[arr[i]]) { seen[arr[i]] = true; out.push(arr[i]); }
  }
  return out.sort();
}
function getInitials(name) {
  if (!name) return "?";
  var parts = name.trim().split(" ");
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function calcIdade(dataNasc) {
  if (!dataNasc) return null;
  var d = parseDate(dataNasc);
  if (d.getTime() === 0) return null;
  var today = new Date();
  var age = today.getFullYear() - d.getFullYear();
  var m = today.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
  return age;
}
function isBirthdayToday(dataNasc) {
  if (!dataNasc) return false;
  var d = parseDate(dataNasc);
  var today = new Date();
  return d.getDate() === today.getDate() && d.getMonth() === today.getMonth();
}
var _nid = 1000;
function genId() { _nid++; return _nid; }

// ── THEME ──────────────────────────────────────────────────
var THEME = "dark";
function toggleTheme() {
  THEME = THEME === "dark" ? "light" : "dark";
  try { localStorage.setItem("mr_theme", THEME); } catch(e){}
  applyTheme();
}
function applyTheme() {
  if (THEME === "light") {
    document.documentElement.className = "theme-light";
  } else {
    document.documentElement.className = "";
  }
}

// ── PERSISTENCE ────────────────────────────────────────────
function loadDB() {
  try {
    var s = localStorage.getItem("mr_app_v1");
    if (s) {
      var d = JSON.parse(s);
      if (!d.trainer) d.trainer = {nome:"Mazinho Rodrigues",apelido:"Mazinho",email:"",telemovel:"",cedula:"",instagram:""};
      return d;
    }
  } catch(e) {}
  return { clientes: [], registros: [], trainer: {nome:"Mazinho Rodrigues",apelido:"Mazinho",email:"",telemovel:"",cedula:"",instagram:""} };
}
function saveDB() {
  try { localStorage.setItem("mr_app_v1", JSON.stringify(DB)); } catch(e) {}
}

// ── DOM helpers ────────────────────────────────────────────
function el(tag, attrs, children) {
  var d = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      if (k === "cls") { d.className = attrs[k]; }
      else if (k === "html") { d.innerHTML = attrs[k]; }
      else if (k === "style" && typeof attrs[k] === "object") { Object.assign(d.style, attrs[k]); }
      else if (k.indexOf("on") === 0) { d.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
      else { d[k] = attrs[k]; }
    }
  }
  if (children) {
    var arr = Array.isArray(children) ? children : [children];
    for (var i = 0; i < arr.length; i++) {
      var c = arr[i];
      if (c == null || c === false) continue;
      if (typeof c === "string") { d.appendChild(document.createTextNode(c)); }
      else { d.appendChild(c); }
    }
  }
  return d;
}
function mkSel(attrs, opts) {
  var s = el("select", attrs);
  for (var i = 0; i < opts.length; i++) {
    var op = document.createElement("option");
    op.value = (opts[i].v != null) ? opts[i].v : opts[i].l;
    op.textContent = opts[i].l;
    s.appendChild(op);
  }
  return s;
}
function mkInput(type, attrs) {
  return el("input", Object.assign({ type: type, cls: "isel" }, attrs || {}));
}
function mkField(labelTxt, inputEl, span) {
  var w = el("div", span ? { cls: "full" } : null);
  w.appendChild(el("div", { cls: "flabel" }, [labelTxt]));
  w.appendChild(inputEl);
  return w;
}
function badge(cls, txt) {
  return el("span", { cls: "badge " + cls }, [txt]);
}

function getPR(aluno) {
  var recs = DB.registros.filter(function(r){return r.aluno===aluno;});
  var pr = {};
  for (var i=0;i<recs.length;i++){
    var key = recs[i].exercicio;
    if (!pr[key] || Number(recs[i].peso) > Number(pr[key].peso)) {
      pr[key] = recs[i];
    }
  }
  return pr;
}
function isNewPR(rec) {
  var recs = DB.registros.filter(function(r){return r.aluno===rec.aluno && r.exercicio===rec.exercicio && r.id!==rec.id;});
  for (var i=0;i<recs.length;i++){
    if (Number(recs[i].peso) >= Number(rec.peso)) return false;
  }
  return recs.length > 0;
}

// ── SVG LINE CHART ─────────────────────────────────────────
function svgLine(container, points, unit) {
  container.innerHTML = "";
  var pts = [];
  for (var i=0;i<points.length;i++){
    var p=points[i];
    if(p.v!=null&&p.v!==""&&!isNaN(Number(p.v)))pts.push({d:p.d,v:Number(p.v)});
  }
  pts.sort(function(a,b){return parseDate(a.d)-parseDate(b.d);});
  if(pts.length<2){container.innerHTML="<div style='color:#444;font-size:10px;padding:8px;text-align:center'>Min. 2 registos</div>";return;}
  var W=container.offsetWidth||280,H=80,PL=32,PR=8,PT=14,PB=20;
  var cw=W-PL-PR,ch=H-PT-PB;
  var vals=pts.map(function(p){return p.v;});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  if(minV===maxV){minV=Math.max(0,minV-1);maxV=maxV+1;}
  var rng=maxV-minV;
  minV=Math.max(0,minV-rng*0.1);maxV=maxV+rng*0.1;
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",W);svg.setAttribute("height",H);
  svg.style.display="block";svg.style.width="100%";
  function xp(i){return PL+i*(cw/(pts.length-1));}
  function yp(v){return PT+ch-((v-minV)/(maxV-minV))*ch;}
  for(var g=0;g<=2;g++){
    var gy=PT+g*(ch/2),gv=maxV-g*(maxV-minV)/2;
    var gl=document.createElementNS(ns,"line");
    gl.setAttribute("x1",PL);gl.setAttribute("y1",gy);gl.setAttribute("x2",PL+cw);gl.setAttribute("y2",gy);
    gl.setAttribute("stroke","#1E1E1E");gl.setAttribute("stroke-dasharray","2,3");
    svg.appendChild(gl);
    var gt=document.createElementNS(ns,"text");
    gt.setAttribute("x",PL-3);gt.setAttribute("y",gy+3);
    gt.setAttribute("text-anchor","end");gt.setAttribute("font-size","7");gt.setAttribute("fill","#444");
    gt.textContent=fmt(gv,0);
    svg.appendChild(gt);
  }
  var apath="M "+xp(0)+" "+(PT+ch);
  for(var i=0;i<pts.length;i++)apath+=" L "+xp(i)+" "+yp(pts[i].v);
  apath+=" L "+xp(pts.length-1)+" "+(PT+ch)+" Z";
  var af=document.createElementNS(ns,"path");
  af.setAttribute("d",apath);af.setAttribute("fill","#C9A800");af.setAttribute("opacity","0.12");
  svg.appendChild(af);
  var lpath="M "+xp(0)+" "+yp(pts[0].v);
  for(var i=1;i<pts.length;i++)lpath+=" L "+xp(i)+" "+yp(pts[i].v);
  var lp=document.createElementNS(ns,"path");
  lp.setAttribute("d",lpath);lp.setAttribute("fill","none");lp.setAttribute("stroke","#C9A800");lp.setAttribute("stroke-width","2");
  svg.appendChild(lp);
  for(var i=0;i<pts.length;i++){
    var cx2=xp(i),cy2=yp(pts[i].v);
    var c1=document.createElementNS(ns,"circle");
    c1.setAttribute("cx",cx2);c1.setAttribute("cy",cy2);c1.setAttribute("r","4");
    c1.setAttribute("fill","#0A0A0A");c1.setAttribute("stroke","#C9A800");c1.setAttribute("stroke-width","2");
    svg.appendChild(c1);
    var vt=document.createElementNS(ns,"text");
    vt.setAttribute("x",cx2);vt.setAttribute("y",cy2-6);
    vt.setAttribute("text-anchor","middle");vt.setAttribute("font-size","7");vt.setAttribute("fill","#C9A800");
    vt.setAttribute("font-weight","700");
    vt.textContent=fmt(pts[i].v,1)+(unit||"");
    svg.appendChild(vt);
    var xparts=pts[i].d.split("/");
    var xt=document.createElementNS(ns,"text");
    xt.setAttribute("x",cx2);xt.setAttribute("y",H-3);
    xt.setAttribute("text-anchor","middle");xt.setAttribute("font-size","7");xt.setAttribute("fill","#444");
    xt.textContent=(xparts[0]||"")+"/"+(xparts[1]||"");
    svg.appendChild(xt);
  }
  container.appendChild(svg);
}

              btns[i].className = "pill-btn btn-press";

function exportPDF(cliente,avIndex){

  var idx=(avIndex!=null)?avIndex:avs.length-1;
  var av=avs[idx];
  var sexo=cliente.sexo||"M";
  var sbg={ok:"#e8f5e9",warn:"#fff8e1",bad:"#ffebee"};
  var scol={ok:"#2e7d32",warn:"#e65100",bad:"#c62828"};
  function mrow(label,val,cls,classLabel,ref){
    var bc=sbg[cls]||"#f5f5f5",fc=scol[cls]||"#333";
    return "<tr><td style='padding:6px 8px;font-size:11px;color:#555;border-bottom:1px solid #f0f0f0;'>"+label+"</td><td style='padding:6px 8px;font-size:11px;font-weight:700;border-bottom:1px solid #f0f0f0;'>"+val+"</td><td style='padding:6px 8px;font-size:10px;color:#888;border-bottom:1px solid #f0f0f0;'>"+(ref||"")+"</td><td style='padding:4px 6px;border-bottom:1px solid #f0f0f0;'>"+(classLabel?"<span style='background:"+bc+";color:"+fc+";border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;'>"+classLabel+"</span>":"")+"</td></tr>";
  }

  if(av.massaMagra)rows+=mrow("Massa Magra",av.massaMagra+" kg","ok","","");
  if(av.gorduraVisceral){var r3=cVisceral(av.gorduraVisceral);rows+=mrow("Gordura Visceral","Nivel "+av.gorduraVisceral,r3.cls,r3.label,"Ideal: 1-9");}
  if(av.aguaCorporal){var r4=cAgua(av.aguaCorporal,sexo);rows+=mrow("Água Corporal",av.aguaCorporal+"%",r4.cls,r4.label,"Ideal: "+(sexo==="F"?"45-60%":"50-65%"));}
  if(av.tmb)rows+=mrow("Taxa Metab. Basal",av.tmb+" kcal","ok","","");
  if(av.idadeMetab)rows+=mrow("Idade Metabólica",av.idadeMetab+" anos","ok","","");
  if(av.pressaoSist&&av.pressaoDiast){var r5=cPressao(av.pressaoSist,av.pressaoDiast);rows+=mrow("Pressão Arterial",av.pressaoSist+"/"+av.pressaoDiast+" mmHg",r5.cls,r5.label,"Ideal: < 120/80");}

  // ── Avatar SVG — redesigned, no crossing lines, M/F silhouettes

    cintura: av.cintura, anca: av.anca,
    coxaD: av.coxaD, coxaE: av.coxaE,
    bracoRD: av.bracoRD, bracoRE: av.bracoRE,
    gemeoD: av.gemeoD, gemeoE: av.gemeoE
  };

  // Layout: avatar centred at x=280
  // RIGHT column (x=370+): ombro, torax, abdomen, cintura, anca — spaced 44px apart, NO crossing
  // LEFT column (x=0-120): coxa D, coxa E, gemeo D, gemeo E — spaced 38px apart
  // Arm labels: bracoRD and bracoRE on right side below anca

  var svg = '<svg width="' + AW + '" height="' + AH + '" viewBox="0 0 ' + AW + ' ' + AH + '" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;font-family:Arial,sans-serif;">';
  svg += '<rect width="' + AW + '" height="' + AH + '" fill="#f8f6f0" rx="10"/>';
  svg += '<text x="' + (AW/2) + '" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#A88900" letter-spacing="3">FICHA DE PERÍMETROS</text>';

  // ── Body centre x
  var bx = 280;

  // ── FEMALE silhouette (SVG path — elegant curves)
  if (isFemale) {
    // Head
    svg += '<ellipse cx="' + bx + '" cy="62" rx="21" ry="24" fill="#2a2a2a"/>';

    svg += '<ellipse cx="' + bx + '" cy="42" rx="23" ry="10" fill="#1a1a1a"/>';

    // Shoulders — narrower for female
    svg += '<path d="M ' + (bx-42) + ' 100 Q ' + (bx-22) + ' 91 ' + bx + ' 93 Q ' + (bx+22) + ' 91 ' + (bx+42) + ' 100 L ' + (bx+40) + ' 114 Q ' + (bx+20) + ' 104 ' + bx + ' 105 Q ' + (bx-20) + ' 104 ' + (bx-40) + ' 114 Z" fill="#2a2a2a"/>';
    // Torso — hourglass female shape
    svg += '<path d="M ' + (bx-34) + ' 100 Q ' + (bx-36) + ' 130 ' + (bx-28) + ' 155 Q ' + (bx-22) + ' 175 ' + (bx-32) + ' 200 L ' + (bx+32) + ' 200 Q ' + (bx+22) + ' 175 ' + (bx+28) + ' 155 Q ' + (bx+36) + ' 130 ' + (bx+34) + ' 100 Z" fill="#222"/>';
    // Arms — slim
    svg += '<path d="M ' + (bx-34) + ' 102 L ' + (bx-46) + ' 105 Q ' + (bx-54) + ' 120 ' + (bx-56) + ' 170 L ' + (bx-44) + ' 171 Q ' + (bx-44) + ' 128 ' + (bx-36) + ' 115 Z" fill="#2a2a2a" rx="5"/>';
    svg += '<path d="M ' + (bx+34) + ' 102 L ' + (bx+46) + ' 105 Q ' + (bx+54) + ' 120 ' + (bx+56) + ' 170 L ' + (bx+44) + ' 171 Q ' + (bx+44) + ' 128 ' + (bx+36) + ' 115 Z" fill="#2a2a2a" rx="5"/>';

    svg += '<path d="M ' + (bx-32) + ' 198 Q ' + (bx-44) + ' 205 ' + (bx-42) + ' 225 L ' + (bx+42) + ' 225 Q ' + (bx+44) + ' 205 ' + (bx+32) + ' 198 Z" fill="#222"/>';

    svg += '<path d="M ' + (bx+20) + ' 296 Q ' + (bx+18) + ' 330 ' + (bx+20) + ' 360 L ' + (bx+34) + ' 360 Q ' + (bx+42) + ' 330 ' + (bx+40) + ' 296 Z" fill="#2a2a2a"/>';
    // Feet
    svg += '<ellipse cx="' + (bx-27) + '" cy="368" rx="14" ry="9" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+27) + '" cy="368" rx="14" ry="9" fill="#2a2a2a"/>';
  } else {
    // ── MALE silhouette — broader shoulders, straighter torso

    // Shoulders — broad
    svg += '<path d="M ' + (bx-52) + ' 102 Q ' + (bx-28) + ' 88 ' + bx + ' 91 Q ' + (bx+28) + ' 88 ' + (bx+52) + ' 102 L ' + (bx+50) + ' 118 Q ' + (bx+26) + ' 105 ' + bx + ' 106 Q ' + (bx-26) + ' 105 ' + (bx-50) + ' 118 Z" fill="#2a2a2a"/>';
    // Torso — straight/athletic
    svg += '<path d="M ' + (bx-38) + ' 102 Q ' + (bx-36) + ' 150 ' + (bx-30) + ' 198 L ' + (bx+30) + ' 198 Q ' + (bx+36) + ' 150 ' + (bx+38) + ' 102 Z" fill="#222"/>';
    // Arms — bulkier
    svg += '<path d="M ' + (bx-38) + ' 104 L ' + (bx-52) + ' 107 Q ' + (bx-60) + ' 130 ' + (bx-60) + ' 172 L ' + (bx-46) + ' 172 Q ' + (bx-47) + ' 134 ' + (bx-40) + ' 116 Z" fill="#2a2a2a"/>';
    svg += '<path d="M ' + (bx+38) + ' 104 L ' + (bx+52) + ' 107 Q ' + (bx+60) + ' 130 ' + (bx+60) + ' 172 L ' + (bx+46) + ' 172 Q ' + (bx+47) + ' 134 ' + (bx+40) + ' 116 Z" fill="#2a2a2a"/>';
    // Hands
    svg += '<ellipse cx="' + (bx-53) + '" cy="179" rx="9" ry="11" fill="#2a2a2a"/>';
    svg += '<ellipse cx="' + (bx+53) + '" cy="179" rx="9" ry="11" fill="#2a2a2a"/>';
    // Hips

    // Thighs
    svg += '<rect x="' + (bx-36) + '" y="224" width="30" height="78" rx="9" fill="#222"/>';

  // ── Label box helper — clean, no overlap
  var lbFn = function(x, y, title, val, anchor) {
    if (!val || Number(val) === 0) return '';

  // Assign label Y positions spaced 40px apart starting at 100, adjusted to avoid overlap
  var rStartY = 100;

  svg += '</svg>';
  var avatarSVG = svg;


  // ── Charts in PDF

  var avs=cliente.avaliacoes||[];

  if(idade)subInfo.push(idade+" anos");

  if(cliente.objetivo)subInfo.push(cliente.objetivo);
  chInfo.appendChild(el("div",{style:{fontSize:"11px",color:"#555",marginTop:"3px",lineHeight:"1.4"}},[subInfo.join(" · ")]));

  chBtns.appendChild(el("button",{cls:"btn-sm btn-press",onClick:function(){STATE.tab="treinos";STATE.fAluno=cliente.nome;STATE.fEx="";renderApp();}},["Treinos"]));

  // ── Health summary

  if(latest.massaGorda){var m2=cGordura(latest.massaGorda,sexo);metrics.push({n:"Massa Gorda",v:latest.massaGorda+"%",cls:m2.cls,l:m2.label,r:"Ideal: "+(sexo==="F"?"14-24%":"6-17%")});}
  if(latest.gorduraVisceral){var m3=cVisceral(latest.gorduraVisceral);metrics.push({n:"Gordura Visceral",v:"Nivel "+latest.gorduraVisceral,cls:m3.cls,l:m3.label,r:"Ideal: 1-9"});}
  if(latest.aguaCorporal){var m4=cAgua(latest.aguaCorporal,sexo);metrics.push({n:"Água Corporal",v:latest.aguaCorporal+"%",cls:m4.cls,l:m4.label,r:"Ideal: "+(sexo==="F"?"45-60%":"50-65%")});}
  if(latest.pressaoSist&&latest.pressaoDiast){var m5=cPressao(latest.pressaoSist,latest.pressaoDiast);metrics.push({n:"Pressão Arterial",v:latest.pressaoSist+"/"+latest.pressaoDiast+" mmHg",cls:m5.cls,l:m5.label,r:"Ideal: < 120/80"});}
  if(latest.cintura){var m6=cCintura(latest.cintura,sexo);metrics.push({n:"Cintura",v:latest.cintura+" cm",cls:m6.cls,l:m6.label,r:"Ideal: "+(sexo==="F"?"< 80cm":"< 94cm")});}
  if(metrics.length){
    metrics.forEach(function(m){
      var row=el("div",{cls:"metric-row"});
      row.appendChild(el("div",null,[el("div",{style:{fontSize:"12px",color:"#aaa"}},[m.n]),el("div",{style:{fontSize:"9px",color:"#444",marginTop:"1px"}},[m.r])]));
      row.appendChild(el("div",{style:{textAlign:"right"}},[el("div",{style:{fontSize:"13px",fontWeight:"700"}},[m.v]),badge(m.cls,m.l)]));
      hs.appendChild(row);
    });
  }

  // Comparison if 2+ evals
  if(avs.length>=2){
    var prev=avs[avs.length-2];
    var cmpFields=[{f:"peso",l:"Peso",u:"kg"},{f:"massaGorda",l:"Gordura",u:"%"},{f:"cintura",l:"Cintura",u:"cm"},{f:"imc",l:"IMC",u:""}];
    var hasCmp=cmpFields.some(function(cf){return latest[cf.f]&&prev[cf.f];});
    if(hasCmp){

      var cmpGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}});
      cmpFields.forEach(function(cf){
        if(!latest[cf.f]||!prev[cf.f])return;
        var delta=Number(latest[cf.f])-Number(prev[cf.f]);

        var isGood=(cf.f==="peso"||cf.f==="massaGorda"||cf.f==="cintura"||cf.f==="imc")?delta<0:delta>0;
        var clr=delta===0?"#555":isGood?"#5CB85C":"#E74C3C";
        var arr=delta===0?"—":delta<0?"▼":"▲";
        var cmpC=el("div",{cls:"cmp-card"});
        cmpC.appendChild(el("div",{style:{fontSize:"9px",color:"#555",marginBottom:"3px"}},[cf.l]));
        cmpC.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"800",color:clr}},[arr+" "+fmt(Math.abs(delta),1)+cf.u]));
        cmpC.appendChild(el("div",{style:{fontSize:"9px",color:"#444"}},[pct+"%"]));
        cmpGrid.appendChild(cmpC);
      });
      hs.appendChild(cmpGrid);
    }
  }

  var recs=getRecomendacoes(latest,sexo);
  if(recs.length){
    var rb=el("div",{style:{marginTop:"10px",background:"rgba(201,168,0,0.06)",border:"1px solid rgba(201,168,0,0.15)",borderRadius:"10px",padding:"10px"}});
    rb.appendChild(el("div",{style:{fontSize:"9px",color:"#C9A800",fontWeight:"700",letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:"6px"}},["Objetivos de Saúde"]));
    recs.forEach(function(r){rb.appendChild(el("div",{style:{fontSize:"11px",color:"#888",marginBottom:"3px"}},["• "+r]));});
    hs.appendChild(rb);
  }
  wrap.appendChild(hs);

  // Evolution charts
  if(avs.length>=2){
    var gbox=el("div",{cls:"card fade-in",style:{marginBottom:"12px"}});
    gbox.appendChild(el("div",{cls:"sec-title"},["Evolução nas Avaliações"]));
    var cgrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}});
    [{f:"peso",l:"Peso",u:"kg"},{f:"imc",l:"IMC",u:""},{f:"massaGorda",l:"Massa Gorda",u:"%"},{f:"cintura",l:"Cintura",u:"cm"}].forEach(function(gt){
      var pts2=avs.filter(function(a){return a[gt.f]&&Number(a[gt.f])>0;});
      if(pts2.length<2)return;
      var cbox=el("div",{cls:"chart-cell"});
      cbox.appendChild(el("div",{style:{fontSize:"9px",color:"#C9A800",fontWeight:"700",letterSpacing:"0.5px",marginBottom:"4px"}},[gt.l]));

    });
    gbox.appendChild(cgrid);wrap.appendChild(gbox);
  }

  // History with PDF per eval
  var hist=el("div",{cls:"card fade-in",style:{marginBottom:"12px"}});
  hist.appendChild(el("div",{cls:"sec-title"},["Histórico ("+avs.length+")"]));
  for(var hi=avs.length-1;hi>=0;hi--){
    var av2=avs[hi];
    var hcard=el("div",{cls:"hist-card"});
    hcard.appendChild(el("div",null,[
      el("div",{style:{fontWeight:"700",fontSize:"13px"}},[av2.dataAv||"Sem data"]),
      el("div",{style:{fontSize:"10px",color:"#555",marginTop:"2px"}},[(av2.peso?"Peso: "+av2.peso+"kg":"")+(av2.imc?" · IMC: "+av2.imc:"")+(av2.objetivo?" · "+av2.objetivo:"")])
    ]));
    (function(avRec,avIdx){
      var btnWrap=el("div",{style:{display:"flex",gap:"5px"}});
      btnWrap.appendChild(el("button",{cls:"btn-sm btn-press",onClick:function(){exportPDF(cliente,avIdx);}},["PDF"]));
      btnWrap.appendChild(el("button",{cls:"btn-sm btn-press",onClick:function(){showModalAvaliacao(cliente,avRec);}},["Editar"]));
      hcard.appendChild(btnWrap);
    })(av2,hi);
    hist.appendChild(hcard);
  }
  wrap.appendChild(hist);

  // Perimetros
  if(latest){
    var hasP=PERIMETROS.some(function(p){return latest[p[0]]&&Number(latest[p[0]])>0;});
    if(hasP){
      var ps=el("div",{cls:"card fade-in"});
      ps.appendChild(el("div",{cls:"sec-title"},["Perímetros (cm) — "+latest.dataAv]));
      var pg=el("div",{cls:"grid3"});
      PERIMETROS.forEach(function(p){
        if(!latest[p[0]]||Number(latest[p[0]])===0)return;
        var pc2=el("div",{cls:"perim-cell"});
        pc2.appendChild(el("div",{cls:"perim-label"},[p[1]]));
        pc2.appendChild(el("div",{cls:"perim-value"},[latest[p[0]]]));
        pc2.appendChild(el("div",{cls:"perim-unit"},["cm"]));
        pg.appendChild(pc2);
      });
      ps.appendChild(pg);wrap.appendChild(ps);
    }
  }
}

function buildClientesView(wrap){
  var iSrch=mkInput("text",{placeholder:"Pesquisar cliente...",style:{width:"100%",marginBottom:"12px"},value:STATE.search||""});
  iSrch.addEventListener("input",function(e){STATE.search=e.target.value;renderApp();});
  wrap.appendChild(iSrch);
  var filtered=DB.clientes.filter(function(c){if(!STATE.search)return true;return c.nome.toLowerCase().indexOf(STATE.search.toLowerCase())>=0;});
  if(!filtered.length){
    wrap.appendChild(el("div",{style:{textAlign:"center",padding:"40px",color:"#444"}},[
      el("div",{style:{fontSize:"36px",marginBottom:"10px"}},["👥"]),
      el("div",{style:{fontSize:"15px",fontWeight:"700",marginBottom:"6px"}},["Nenhum cliente"]),
      el("button",{cls:"btn-gold btn-press",style:{marginTop:"10px"},onClick:function(){showModalCliente();}},["+ Adicionar Cliente"])
    ]));
    return;
  }
  for(var i=0;i<filtered.length;i++){
    var c=filtered[i];
    var avs=c.avaliacoes||[];
    var latest=avs.length?avs[avs.length-1]:null;
    var bday=isBirthdayToday(c.dataNasc);
    var card=el("div",{cls:"card card-hover fade-in",style:{marginBottom:"8px",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px"}});
    var avatarEl2=mkAvatar(c,false);
    card.appendChild(avatarEl2);
    var info=el("div",{style:{flex:"1",minWidth:"0"}});
    var nameRow2=el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
    nameRow2.appendChild(el("div",{style:{fontSize:"14px",fontWeight:"700"}},[c.nome]));
    if(bday)nameRow2.appendChild(el("span",{style:{fontSize:"13px"}},["🎂"]));
    info.appendChild(nameRow2);
    var subParts=[(c.sexo==="F"?"Feminino":"Masculino")];
    var idade2=calcIdade(c.dataNasc);if(idade2)subParts.push(idade2+" anos");
    subParts.push(avs.length+" aval.");
    if(latest)subParts.push("Ultima: "+latest.dataAv);
    info.appendChild(el("div",{style:{fontSize:"10px",color:"#555",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[subParts.join(" · ")]));
    card.appendChild(info);
    var cb=el("div",{style:{display:"flex",gap:"6px",flexShrink:"0"}});
    (function(cliente){
      var vBtn=el("button",{cls:"btn-sm btn-press"},["Ver"]);
      vBtn.addEventListener("click",function(e){e.stopPropagation();STATE.tab="perfil";STATE.clienteId=cliente.id;renderApp();});
      cb.appendChild(vBtn);
      if(cliente.avaliacoes&&cliente.avaliacoes.length){
        var pBtn=el("button",{cls:"btn-sm btn-press",style:{borderColor:"rgba(201,168,0,0.5)"}},["PDF"]);
        pBtn.addEventListener("click",function(e){e.stopPropagation();exportPDF(cliente,cliente.avaliacoes.length-1);});
        cb.appendChild(pBtn);
      }
    })(c);
    card.appendChild(cb);
    card.addEventListener("click",function(){STATE.tab="perfil";STATE.clienteId=c.id;renderApp();});
    wrap.appendChild(card);
  }
}

function getGreeting(){
  var h=new Date().getHours();
  if(h<12)return"Bom dia";
  if(h<18)return"Boa tarde";
  return"Boa noite";
}

    cp.appendChild(cpCard);
  }
  wrap.appendChild(cp);

  // Retention row
  var retCard=el("div",{cls:"card",style:{borderRadius:"16px",padding:"16px",display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}});
  var retIcon=el("div",{cls:"action-icon-box",style:{width:"42px",height:"42px",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center"}});
  retIcon.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" stroke="#C9A800" fill="none" stroke-width="1.8" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>';
  retCard.appendChild(retIcon);
  retCard.appendChild(el("div",{style:{flex:"1",fontWeight:"700",fontSize:"15px",color:THEME==="light"?"#111":"#fff"}},["Retenção"]));
  retCard.appendChild(el("div",{style:{fontSize:"15px",fontWeight:"800",color:"#C9A800"}},[retencao+"%"]));
  wrap.appendChild(retCard);
}


// ── MODAL: Perfil do Trainer ───────────────────────────────
function showModalTrainer(){
  var t=JSON.parse(JSON.stringify(DB.trainer));
  var ov=el("div",{cls:"overlay"});
  var modal=el("div",{cls:"modal slide-up"});
  modal.appendChild(el("div",{cls:"modal-hdr"},[
    el("div",{style:{fontSize:"15px",fontWeight:"800"}},["Meu Perfil"]),
    el("button",{cls:"btn-outline btn-press",onClick:function(){ov.remove();}},["X"])
  ]));

  // Avatar preview
  var photoWrap=el("div",{style:{textAlign:"center",marginBottom:"16px"}});
  var avatarBox=el("div",{style:{width:"72px",height:"72px",background:"linear-gradient(135deg,#1E1A00,#3A3000)",borderRadius:"50%",border:"3px solid #C9A800",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",fontWeight:"900",color:"#C9A800",margin:"0 auto 10px"}});
  avatarBox.textContent=(t.apelido||t.nome||"MR").substring(0,2).toUpperCase();
  photoWrap.appendChild(avatarBox);
  photoWrap.appendChild(el("div",{style:{fontSize:"10px",color:"#555"}},["Personal Trainer"]));
  modal.appendChild(photoWrap);

  var g=el("div",{cls:"grid2"});
  function fld(label,key,type,placeholder){
    var inp=mkInput(type||"text",{placeholder:placeholder||"",value:t[key]||""});
    inp.addEventListener("input",function(e){t[key]=e.target.value;});
    g.appendChild(mkField(label,inp));
    return inp;
  }
  g.appendChild(el("div",{cls:"full"},[mkField("Nome completo *", (function(){var i=mkInput("text",{placeholder:"Ex: Mazinho Rodrigues",value:t.nome||""});i.addEventListener("input",function(e){t.nome=e.target.value;});return i;})())]));
  fld("Apelido *","apelido","text","Ex: Mazinho");
  fld("Email *","email","email","Ex: mazinho@email.com");
  fld("Telemóvel *","telemovel","tel","Ex: 912 345 678");
  fld("Cédula *","cedula","text","Nº cédula profissional");
  fld("Instagram *","instagram","text","@mazinhorodrigues");
  modal.appendChild(g);

  var foot=el("div",{style:{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"16px"}});
  foot.appendChild(el("button",{cls:"btn-outline btn-press",onClick:function(){ov.remove();}},["Cancelar"]));
  foot.appendChild(el("button",{cls:"btn-gold btn-press",onClick:function(){
    if(!t.nome.trim()){alert("Nome obrigatório.");return;}
    if(!t.apelido.trim()){alert("Apelido obrigatório.");return;}
    if(!t.email.trim()){alert("Email obrigatório.");return;}
    if(!t.telemovel.trim()){alert("Telemóvel obrigatório.");return;}
    if(!t.cedula.trim()){alert("Cédula obrigatória.");return;}
    if(!t.instagram.trim()){alert("Instagram obrigatório.");return;}
    DB.trainer=t;saveDB();ov.remove();renderApp();
  }},["Guardar"]));
  modal.appendChild(foot);
  ov.appendChild(modal);
  document.getElementById("app").appendChild(ov);
}

function renderApp(){
  var app=document.getElementById("app");
  var toRemove=[];
  for(var i=0;i<app.children.length;i++){if(!app.children[i].classList.contains("overlay"))toRemove.push(app.children[i]);}
  for(var i=0;i<toRemove.length;i++)toRemove[i].remove();

  // ── Header
  var hdr=el("div",{cls:"hdr"});
  var hLeft=el("div",{style:{display:"flex",alignItems:"center",gap:"12px"}});
  hLeft.appendChild(el("div",{cls:"logo"},["MR"]));
  hLeft.appendChild(el("div",null,[
    el("div",{style:{fontSize:"17px",fontWeight:"900",letterSpacing:"-0.2px"}},[DB.trainer.apelido||DB.trainer.nome||"Mazinho Rodrigues"]),
    el("div",{style:{fontSize:"9px",color:"#C9A800",letterSpacing:"3px",textTransform:"uppercase",marginTop:"1px"}},["Personal Trainer"])
  ]));
  hdr.appendChild(hLeft);
  var hRight=el("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});

  // Theme toggle — always visible
  var isDark=THEME==="dark";
  var themeBtn=el("button",{cls:"btn-press",style:{background:"#161616",border:"1px solid #2A2A2A",borderRadius:"10px",padding:"7px 10px",cursor:"pointer",fontSize:"14px",lineHeight:"1"}},[isDark?"☀️":"🌙"]);
  themeBtn.addEventListener("click",function(){toggleTheme();renderApp();});
  hRight.appendChild(themeBtn);

  if(STATE.tab==="inicio"){
    hRight.appendChild(el("div",{style:{fontSize:"12px",color:"#555",marginRight:"4px"}},[getGreeting()]));
    var trainerAvt=el("div",{cls:"hdr-avatar btn-press"},[(DB.trainer.apelido||DB.trainer.nome||"MR").substring(0,2).toUpperCase()]);
    trainerAvt.addEventListener("click",function(){showModalTrainer();});
    hRight.appendChild(trainerAvt);
  }
  if(STATE.tab==="treinos"||STATE.tab==="registros"){
    var nb=el("button",{cls:"btn-gold btn-press",style:{fontSize:"12px",padding:"8px 14px"}},["+Registo"]);
    nb.addEventListener("click",function(){showModalTreino();});
    hRight.appendChild(nb);
  }
  if(STATE.tab==="anamnese"&&STATE.clienteId){
    var na=el("button",{cls:"btn-gold btn-press",style:{fontSize:"12px",padding:"8px 14px"}},["+Anamnese"]);
    na.addEventListener("click",function(){var cl=null;for(var i=0;i<DB.clientes.length;i++){if(DB.clientes[i].id===STATE.clienteId){cl=DB.clientes[i];break;}}if(cl)showModalAnamnese(cl);});
    hRight.appendChild(na);
  }
  if(STATE.tab==="clientes"||STATE.tab==="perfil"){
    var nc=el("button",{cls:"btn-gold btn-press",style:{fontSize:"12px",padding:"8px 14px"}},["+Cliente"]);
    nc.addEventListener("click",function(){showModalCliente();});
    hRight.appendChild(nc);
  }
  hdr.appendChild(hRight);
  app.appendChild(hdr);

  // Birthday banner
  var birthdays=DB.clientes.filter(function(c){return isBirthdayToday(c.dataNasc);});
  if(birthdays.length){
    var bnotif=el("div",{style:{background:"linear-gradient(135deg,#1E1A00,#2A2200)",borderBottom:"1px solid rgba(201,168,0,0.3)",padding:"8px 16px",display:"flex",alignItems:"center",gap:"8px"}});
    bnotif.appendChild(el("span",{style:{fontSize:"16px"}},["🎂"]));
    var names=birthdays.map(function(c){return c.nome;}).join(", ");
    bnotif.appendChild(el("span",{style:{fontSize:"12px",color:"#C9A800",fontWeight:"600"}},["Aniversário hoje: "+names+"!"]));
    app.appendChild(bnotif);
  }

  // Content
  var content=el("div",{style:{padding:"16px 16px",maxWidth:"700px",margin:"0 auto"}});
  if(STATE.tab==="treinos")buildTreinosView(content);
  else if(STATE.tab==="registros")buildRegistrosView(content);
  else if(STATE.tab==="clientes")buildClientesView(content);
  else if(STATE.tab==="perfil")buildPerfilView(content);
  else if(STATE.tab==="anamnese")buildAnamneseView(content);
  else buildInicioView(content);
  app.appendChild(content);

  // ── Bottom navigation
  var NAV=[
    {k:"inicio",l:"Início",icon:'<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'},
    {k:"clientes",l:"Clientes",icon:'<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'},
    {k:"treinos",l:"Treinos",icon:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" rx="2"/><rect x="13" y="2" width="9" height="9" rx="2"/><rect x="2" y="13" width="9" height="9" rx="2"/><rect x="13" y="13" width="9" height="9" rx="2"/></svg>'},
    {k:"registros",l:"Análises",icon:'<svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>'}
  ];
  var bnav=el("div",{cls:"bottom-nav"});
  NAV.forEach(function(n){
    var active=STATE.tab===n.k||(n.k==="clientes"&&(STATE.tab==="perfil"||STATE.tab==="anamnese"));
    var btn=el("button",{cls:active?"active":""});
    var svgWrap=el("div");
    svgWrap.innerHTML=n.icon;
    var svgEl=svgWrap.querySelector("svg");
    svgEl.style.width="22px";svgEl.style.height="22px";
    svgEl.style.stroke=active?"#C9A800":"#444";
    svgEl.style.fill="none";svgEl.style.strokeWidth="1.8";
    svgEl.style.strokeLinecap="round";svgEl.style.strokeLinejoin="round";
    btn.appendChild(svgEl);
    btn.appendChild(el("span",null,[n.l]));
    var dot=el("div",{cls:"nav-dot"});
    btn.appendChild(dot);
    (function(key){btn.addEventListener("click",function(){
      STATE.tab=key;STATE.search="";
      if(key==="treinos"||key==="registros")STATE.fAluno="Todos";
      if(key==="clientes")STATE.clienteId=null;
      renderApp();
    });})(n.k);
    bnav.appendChild(btn);
  });
  app.appendChild(bnav);
}
renderApp();

</script>
</body>
</html>
